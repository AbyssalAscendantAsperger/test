<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J2ME Portal</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #ddd;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #00d4ff;
            margin: 0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .jar-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }
        .jar-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 18px;
            border: 1px solid #333;
            transition: 0.2s;
            cursor: pointer;
        }
        .jar-card:hover {
            border-color: #00d4ff;
            transform: translateY(-3px);
        }
        .jar-name {
            font-weight: 600;
            color: white;
            margin-bottom: 6px;
            word-break: break-all;
            font-size: 13px;
        }
        .play-btn {
            background: #00d4ff;
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 12px;
            width: 100%;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #111;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.95);
            border: 2px solid #222;
            width: 244px;
        }
        .modal-header {
            background: #1a1a2e;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
        }
        .emulator-frame {
            width: 240px;
            height: 320px;
            border: none;
            background: #000;
            display: block;
        }
        .modal-header h3 {
            margin: 0;
            color: #00d4ff;
            font-size: 10px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            color: #00c853;
            font-size: 14px;
        }
        .hint {
            text-align: center;
            font-size: 9px;
            color: #555;
            padding: 2px;
            background: #1a1a2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 J2ME Portal</h1>
            <p style="color:#888">Chọn game để chơi</p>
        </div>

        <div id="status" class="status"></div>
        
        <div id="jarList" class="jar-list">
            <div style="text-align:center;color:#666">Đang tải...</div>
        </div>
    </div>

    <!-- Modal Emulator -->
    <div id="emulatorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Game</h3>
                <button class="close-btn" onclick="closeEmulator()">×</button>
            </div>
            <iframe id="emulatorFrame" class="emulator-frame"></iframe>
            <div class="hint">Nhấn vào màn hình • WASD + Space + Q/E</div>
        </div>
    </div>

    <script>
        let currentFrame = null;
        let keyListener = null;

        async function loadJars() {
            const container = document.getElementById('jarList');
            const status = document.getElementById('status');

            try {
                const res = await fetch('/api/jars');
                const data = await res.json();

                if (data.error || !data.jars?.length) {
                    container.innerHTML = `<div style="color:#ff6b6b">Không tìm thấy file .jar</div>`;
                    return;
                }

                status.innerHTML = `✅ Tìm thấy ${data.jars.length} game`;
                container.innerHTML = '';

                data.jars.forEach(jar => {
                    const card = document.createElement('div');
                    card.className = 'jar-card';
                    card.innerHTML = `
                        <div class="jar-name">${jar}</div>
                        <button class="play-btn">▶ Chơi ngay</button>
                    `;
                    card.onclick = () => launchGame(jar);
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = `<div style="color:#ff6b6b">Lỗi kết nối server</div>`;
            }
        }

        async function launchGame(jarName) {
            const modal = document.getElementById('emulatorModal');
            const frame = document.getElementById('emulatorFrame');
            const title = document.getElementById('modalTitle');

            title.textContent = jarName;
            modal.style.display = 'flex';
            currentFrame = frame;

            try {
                const res = await fetch(`/api/launch?jar=${encodeURIComponent(jarName)}`);
                const data = await res.json();

                if (data.success) {
                    frame.src = data.url;

                    setTimeout(() => {
                        setupKeyboardMapping(frame);
                        frame.focus();
                    }, 2000);
                }
            } catch (e) {
                frame.srcdoc = `<h3 style="color:red;padding:30px">Lỗi kết nối</h3>`;
            }
        }

        // ==================== MAP PHÍM MẠNH (Gửi cả key + keyCode + MIDP) ====================
        function setupKeyboardMapping(iframe) {
            const keyMap = {
                // WASD
                'w': { key: 'ArrowUp',    code: -1 },
                'a': { key: 'ArrowLeft',  code: -3 },
                's': { key: 'ArrowDown',  code: -2 },
                'd': { key: 'ArrowRight', code: -4 },

                // Q/E
                'q': { key: 'Q', code: -6 },
                'e': { key: 'E', code: -7 },

                // Space
                ' ': { key: 'Enter', code: -5 },

                // Số
                '0': { key: '0', code: 48 },
                '1': { key: '1', code: 49 },
                '2': { key: '2', code: 50 },
                '3': { key: '3', code: 51 },
                '4': { key: '4', code: 52 },
                '5': { key: '5', code: 53 },
                '6': { key: '6', code: 54 },
                '7': { key: '7', code: 55 },
                '8': { key: '8', code: 56 },
                '9': { key: '9', code: 57 },

                // * #
                '*': { key: '*', code: 42 },
                '#': { key: '#', code: 35 }
            };

            function sendKey(mapped, isPress) {
                try {
                    const win = iframe.contentWindow;
                    if (!win) return;

                    const eventType = isPress ? 'keydown' : 'keyup';

                    // Gửi event đầy đủ
                    const event = new KeyboardEvent(eventType, {
                        key: mapped.key,
                        keyCode: mapped.code,
                        which: mapped.code,
                        bubbles: true,
                        cancelable: true
                    });

                    win.dispatchEvent(event);

                    // Gọi trực tiếp MIDP (cách emulator gốc dùng)
                    if (win.MIDP) {
                        if (isPress && win.MIDP.sendKeyPress) {
                            win.MIDP.sendKeyPress(mapped.code);
                        } else if (!isPress && win.MIDP.sendKeyRelease) {
                            win.MIDP.sendKeyRelease(mapped.code);
                        }
                    }
                } catch (e) {}
            }

            if (keyListener) {
                document.removeEventListener('keydown', keyListener);
                document.removeEventListener('keyup', keyListener);
            }

            keyListener = function(e) {
                if (!currentFrame) return;
                const mapped = keyMap[e.key.toLowerCase()];
                if (mapped) {
                    e.preventDefault();
                    sendKey(mapped, e.type === 'keydown');
                    try {
                        currentFrame.focus();
                        currentFrame.contentWindow.focus();
                    } catch(e){}
                }
            };

            document.addEventListener('keydown', keyListener);
            document.addEventListener('keyup', keyListener);

            currentFrame.onclick = () => currentFrame.contentWindow.focus();
            currentFrame.ontouchstart = () => currentFrame.contentWindow.focus();
        }

        function closeEmulator() {
            const modal = document.getElementById('emulatorModal');
            const frame = document.getElementById('emulatorFrame');

            frame.src = 'about:blank';
            modal.style.display = 'none';
            currentFrame = null;

            if (keyListener) {
                document.removeEventListener('keydown', keyListener);
                document.removeEventListener('keyup', keyListener);
                keyListener = null;
            }
        }

        window.onload = () => {
            loadJars();

            document.getElementById('emulatorModal').onclick = function(e) {
                if (e.target.id === 'emulatorModal') closeEmulator();
            };

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('emulatorModal');
                    if (modal.style.display === 'flex') closeEmulator();
                }
            });
        };
    </script>
</body>
</html>
