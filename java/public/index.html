<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J2ME Portal</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #ddd;
            margin: 0;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #00d4ff; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        .jar-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }
        .jar-card {
            background: #1a1a2e; border-radius: 12px; padding: 18px;
            border: 1px solid #333; transition: 0.2s; cursor: pointer;
            display: flex; gap: 12px; align-items: flex-start;
        }
        .jar-card:hover { border-color: #00d4ff; transform: translateY(-3px); }
        .game-icon {
            width: 48px; height: 48px; flex: 0 0 48px;
            object-fit: contain; border-radius: 8px;
            background: #0f0f1a; image-rendering: pixelated;
        }
        .game-icon-placeholder {
            width: 48px; height: 48px; flex: 0 0 48px; border-radius: 8px;
            background: #0f0f1a; display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .game-info { flex: 1; min-width: 0; }
        .jar-name { font-weight: 600; color: white; margin-bottom: 2px; word-break: break-all; font-size: 13px; }
        .game-res { font-size: 9px; color: #555; margin-bottom: 6px; }
        .play-btn {
            background: #00d4ff; color: black; border: none; padding: 8px 16px;
            border-radius: 6px; font-weight: bold; margin-top: 6px; width: 100%; cursor: pointer;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; border-radius: 6px; overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.95); border: 2px solid #222;
            transform-origin: center center;
        }
        .modal-header {
            background: #1a1a2e; padding: 4px 8px; display: flex;
            justify-content: space-between; align-items: center; font-size: 10px; gap: 4px;
        }
        .emulator-frame { width: 240px; height: 320px; border: none; background: #000; display: block; }
        .modal-header h3 {
            margin: 0; color: #00d4ff; font-size: 10px; max-width: 110px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .close-btn {
            background: #ff4757; color: white; border: none; width: 18px; height: 18px;
            border-radius: 50%; cursor: pointer; font-size: 12px; flex: 0 0 auto;
        }
        .status { text-align: center; margin-bottom: 20px; color: #00c853; font-size: 14px; }
        .hint { text-align: center; font-size: 9px; color: #555; padding: 2px; background: #1a1a2e; }
        .save-status {
            color: #00c853; font-size: 9px; margin-left: auto; margin-right: 2px;
            max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .save-btn {
            background: #2d4a2d; color: #6cff6c; border: none; width: 18px; height: 18px;
            border-radius: 50%; cursor: pointer; font-size: 10px; flex: 0 0 auto;
        }
        .save-btn:hover { background: #3a6b3a; }
        .rotate-btn {
            background: #2d3a4a; color: #7cc4ff; border: none; width: 18px; height: 18px;
            border-radius: 50%; cursor: pointer; font-size: 10px; flex: 0 0 auto;
        }
        .rotate-btn:hover { background: #3a4f6a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 J2ME Portal</h1>
            <p style="color:#888">Chọn game để chơi</p>
        </div>
        <div id="status" class="status"></div>
        <div id="jarList" class="jar-list">
            <div style="text-align:center;color:#666">Đang tải...</div>
        </div>
    </div>

    <!-- Modal Emulator -->
    <div id="emulatorModal" class="modal">
        <div class="modal-content" id="modalContent">
            <div class="modal-header">
                <h3 id="modalTitle">Game</h3>
                <span id="saveStatus" class="save-status">💾 sẵn sàng</span>
                <button class="save-btn" title="Lưu ngay lên server" onclick="exportSave(false)">💾</button>
                <button class="rotate-btn" title="Xoay màn hình" onclick="rotateGame()">↻</button>
                <button class="close-btn" onclick="closeEmulator()">×</button>
            </div>
            <iframe id="emulatorFrame" class="emulator-frame"></iframe>
            <div class="hint">Nhấn vào màn hình • WASD + Space + Q/E</div>
        </div>
    </div>

    <script>
        let currentFrame = null;
        let keyListener = null;
        let exitWatcher = null;
        let autosaveTimer = null;
        let autofitTimer = null;
        let closing = false;

        async function loadJars() {
            const container = document.getElementById('jarList');
            const status = document.getElementById('status');
            try {
                const res = await fetch('/api/jars');
                const data = await res.json();
                if (data.error || !data.games?.length) {
                    container.innerHTML = '<div style="color:#ff6b6b">Không tìm thấy game</div>';
                    return;
                }
                status.innerHTML = '✅ Tìm thấy ' + data.games.length + ' game';
                container.innerHTML = '';
                data.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'jar-card';
                    let iconHtml = '';
                    if (game.hasIcon) {
                        iconHtml = '<img class="game-icon" src="/api/icon/' + game.id + '" alt="" onerror="this.outerHTML=\'<div class=game-icon-placeholder>🎮</div>\'">';
                    } else {
                        iconHtml = '<div class="game-icon-placeholder">🎮</div>';
                    }
                    const r = game.resolution;
                    const resBadge = r ? '<div class="game-res">' + r.width + '×' + r.height + '</div>' : '';
                    card.innerHTML = iconHtml + '<div class="game-info"><div class="jar-name">' + game.name + '</div>' + resBadge + '<button class="play-btn">▶ Chơi ngay</button></div>';
                    card.onclick = () => launchGame(game.id, game.name);
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = '<div style="color:#ff6b6b">Lỗi kết nối server</div>';
            }
        }

        async function launchGame(gameId, gameName) {
            const modal = document.getElementById('emulatorModal');
            const frame = document.getElementById('emulatorFrame');
            const title = document.getElementById('modalTitle');
            const status = document.getElementById('saveStatus');
            title.textContent = gameName || 'Game';
            modal.style.display = 'flex';
            currentFrame = frame;
            currentGameId = gameId;
            autoRotateTried = false;
            closing = false;
            if (status) status.textContent = '⏳ đang tải save...';
            try {
                await loadSaveFromServer();
                const r = await fetch('/api/launch?id=' + encodeURIComponent(gameId));
                const data = await r.json();
                if (data.success) {
                    // URL đã chứa canvasSize tự động từ server -> dùng trực tiếp
                    frame.src = data.url;
                    setTimeout(() => {
                        setupKeyboardMapping(frame);
                        hookExit(frame);
                        startAutosave();
                        startAutoFit();
                        frame.focus();
                    }, 2000);
                    startAutoRotate();
                } else if (data.error) {
                    frame.srcdoc = '<h3 style="color:red;padding:30px">' + data.error + '</h3>';
                }
            } catch (e) {
                frame.srcdoc = '<h3 style="color:red;padding:30px">Lỗi kết nối</h3>';
            }
        }

        function startAutoFit() {
            stopAutoFit();
            autofitTimer = setInterval(() => {
                if (!currentFrame || closing) { stopAutoFit(); return; }
                fitFrame();
            }, 400);
        }
        function stopAutoFit() { if (autofitTimer) { clearInterval(autofitTimer); autofitTimer = null; } }

        function fitFrame() {
            const frame = document.getElementById('emulatorFrame');
            const modalContent = document.getElementById('modalContent');
            try {
                const win = frame.contentWindow;
                const doc = win && win.document;
                if (!doc) return;
                const canvas = doc.getElementById('canvas');
                if (!canvas) return;
                const cw = canvas.width, ch = canvas.height;
                if (!cw || !ch || (cw === frame._fitW && ch === frame._fitH)) return;
                frame._fitW = cw; frame._fitH = ch;
                const maxW = window.innerWidth - 24;
                const maxH = window.innerHeight - 70;
                const scale = Math.min(1, maxW / cw, maxH / ch);
                frame.style.width = cw + 'px';
                frame.style.height = ch + 'px';
                modalContent.style.width = cw + 'px';
                modalContent.style.transform = scale < 1 ? 'scale(' + scale + ')' : 'none';
            } catch (e) {}
        }

        let autoRotateTried = false;
        let autoRotateTimer = null;
        let autoRotateAttempts = 0;
        let currentGameId = null;

        // ==================== XOAY MÀN HÌNH + TỰ PHÁT HIỆN HƯỚNG ====================
        function rotateGame() {
            if (!currentFrame || closing) return;
            const oldSrc = currentFrame.src;
            const m = oldSrc.match(/canvasSize=size-(\d+)x(\d+)/);
            if (!m) return;
            const newRes = 'size-' + m[2] + 'x' + m[1];
            currentFrame.src = oldSrc.replace(/canvasSize=size-\d+x\d+/, 'canvasSize=' + newRes);
            autoRotateTried = true;
            stopAutoRotate();
            startAutoFit();
        }

        // Polling mỗi 1 giây: chỉ xoay khi game đã render nội dung thật (canvas không còn trống)
        function startAutoRotate() {
            stopAutoRotate();
            autoRotateAttempts = 0;
            autoRotateTimer = setInterval(() => {
                if (!currentFrame || closing) { stopAutoRotate(); return; }
                autoRotateAttempts++;
                if (autoRotateAttempts > 10) { stopAutoRotate(); return; }
                autoDetectOrientation();
            }, 1000);
        }
        function stopAutoRotate() {
            if (autoRotateTimer) { clearInterval(autoRotateTimer); autoRotateTimer = null; }
        }

        // Scan pixel: trả true khi đã thấy nội dung (dừng polling), false khi canvas còn trống
        function autoDetectOrientation() {
            if (autoRotateTried || !currentFrame || closing) return true;
            try {
                const win = currentFrame.contentWindow;
                const doc = win && win.document;
                if (!doc) return false;
                const canvas = doc.getElementById('canvas');
                if (!canvas || !canvas.width || !canvas.height) return false;
                const ctx = canvas.getContext('2d');
                if (!ctx) return false;
                const w = canvas.width, h = canvas.height;
                const halfW = Math.floor(w / 2), halfH = Math.floor(h / 2);
                let q = [0, 0, 0, 0], total = 0;
                for (let y = 0; y < h; y += 2) {
                    for (let x = 0; x < w; x += 2) {
                        const data = ctx.getImageData(x, y, 1, 1).data;
                        const r = data[0], g = data[1], b = data[2];
                        const isBg = (r < 8 && g < 8 && b < 8) || (r > 247 && g > 247 && b > 247);
                        if (!isBg) { q[(x < halfW ? 0 : 1) + (y < halfH ? 0 : 2)]++; total++; }
                    }
                }
                if (total < 50) return false; // canvas còn trống -> đợi lần sau
                const ratio = total / ((w / 2) * (h / 2));
                if (ratio < 0.55) {
                    const topC = q[0] + q[1], botC = q[2] + q[3];
                    const leftC = q[0] + q[2], rightC = q[1] + q[3];
                    if (h > w && topC > 0 && botC < topC * 0.25) { rotateGame(); return true; }
                    if (w > h && leftC > 0 && rightC < leftC * 0.25) { rotateGame(); return true; }
                }
                return true;
            } catch (e) { return false; }
        }

        function setupKeyboardMapping(iframe) {
            const keyMap = {
                'w': { code: -1 }, 'a': { code: -3 }, 's': { code: -2 }, 'd': { code: -4 },
                'q': { code: -6 }, 'e': { code: -7 },
                'z': { code: 122 }, 'c': { code: 99 },
                ' ': { code: -5 },
                '0': { code: 48 }, '1': { code: 49 }, '2': { code: 50 }, '3': { code: 51 },
                '4': { code: 52 }, '5': { code: 53 }, '6': { code: 54 }, '7': { code: 55 },
                '8': { code: 56 }, '9': { code: 57 },
                '*': { code: 42 }, '#': { code: 35 }
            };
            function sendKey(mapped, isPress) {
                try {
                    const win = iframe.contentWindow;
                    if (!win || !win.MIDP) return;
                    if (isPress && win.MIDP.sendKeyPress) win.MIDP.sendKeyPress(mapped.code);
                    else if (!isPress && win.MIDP.sendKeyRelease) win.MIDP.sendKeyRelease(mapped.code);
                } catch (e) {}
            }
            if (keyListener) {
                document.removeEventListener('keydown', keyListener);
                document.removeEventListener('keyup', keyListener);
            }
            keyListener = function(e) {
                if (!currentFrame) return;
                const mapped = keyMap[e.key.toLowerCase()];
                if (mapped) { e.preventDefault(); sendKey(mapped, e.type === 'keydown'); }
            };
            document.addEventListener('keydown', keyListener);
            document.addEventListener('keyup', keyListener);
            currentFrame.onclick = () => currentFrame.contentWindow.focus();
            currentFrame.ontouchstart = () => currentFrame.contentWindow.focus();
        }

        function hookExit(iframe) {
            let win;
            try { win = iframe.contentWindow; } catch (e) { return; }
            if (!win) return;
            if (typeof win.showExitScreen === 'function') {
                win.showExitScreen = function() {
                    try { if (win.myflushAll) win.myflushAll(); } catch (e) {}
                    handleGameExit('game thoát');
                };
            }
            stopExitWatcher();
            exitWatcher = setInterval(() => {
                if (!currentFrame || closing) { stopExitWatcher(); return; }
                try {
                    const w = iframe.contentWindow;
                    if (!w) return;
                    const href = (w.location && w.location.href) || '';
                    if (href && !href.includes('main.html')) { handleGameExit('iframe rời main.html'); return; }
                    const doc = w.document;
                    const es = doc && doc.getElementById('exit-screen');
                    if (es && es.style && es.style.display === 'block') { handleGameExit('exit-screen'); return; }
                    const df = doc && doc.getElementById('download-failure-dialog');
                    if (df && df.style && df.style.display !== 'none') { handleGameExit('load lỗi'); return; }
                } catch (e) {}
            }, 350);
        }
        function stopExitWatcher() { if (exitWatcher) { clearInterval(exitWatcher); exitWatcher = null; } }

        async function handleGameExit(reason) {
            if (closing || !currentFrame) return;
            closing = true;
            stopExitWatcher(); stopAutosave(); stopAutoFit(); stopAutoRotate();
            const status = document.getElementById('saveStatus');
            if (status) status.textContent = '💾 ' + reason + ', đang lưu...';
            await exportSave(true);
            document.getElementById('emulatorModal').style.display = 'none';
            document.getElementById('modalContent').style.transform = 'none';
            const frame = document.getElementById('emulatorFrame');
            currentFrame = null;
            if (keyListener) {
                document.removeEventListener('keydown', keyListener);
                document.removeEventListener('keyup', keyListener);
                keyListener = null;
            }
            frame.src = 'about:blank';
        }

        function openFsDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('asyncStorage', 4);
                req.onupgradeneeded = (ev) => {
                    const d = ev.target.result;
                    if (!d.objectStoreNames.contains('fs4')) {
                        const os = d.createObjectStore('fs4', { keyPath: 'pathname' });
                        os.createIndex('parentDir', 'parentDir', { unique: false });
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }
        async function importSaveToIDB(saveObj) {
            const db = await openFsDB();
            await new Promise((resolve, reject) => {
                const tx = db.transaction('fs4', 'readwrite');
                tx.objectStore('fs4').clear();
                for (const pathname in saveObj) {
                    const rec = saveObj[pathname];
                    if (!rec) continue;
                    if (!rec.isDir && Array.isArray(rec.data)) {
                        try { rec.data = new Blob([new Int8Array(rec.data)]); } catch (e) {}
                    }
                    rec.pathname = pathname;
                    tx.objectStore('fs4').put(rec);
                }
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
            db.close();
        }
        async function readIDBToText() {
            let db;
            try { db = await openFsDB(); } catch (e) { return '{}'; }
            if (!db.objectStoreNames.contains('fs4')) { db.close(); return '{}'; }
            const text = await new Promise((resolve) => {
                const tx = db.transaction('fs4', 'readonly');
                const allReq = tx.objectStore('fs4').getAll();
                allReq.onsuccess = () => {
                    const records = allReq.result || [];
                    const obj = {}; let pending = 0, done = false;
                    const finish = () => { if (pending === 0 && !done) { done = true; resolve(JSON.stringify(obj)); } };
                    records.forEach(rec => {
                        if (!rec || !rec.pathname) return;
                        if (!rec.isDir && rec.data instanceof Blob) {
                            pending++;
                            const reader = new FileReader();
                            reader.onload = () => {
                                rec.data = Array.prototype.slice.call(new Int8Array(reader.result));
                                obj[rec.pathname] = rec; pending--; finish();
                            };
                            reader.onerror = () => { obj[rec.pathname] = rec; pending--; finish(); };
                            reader.readAsArrayBuffer(rec.data);
                        } else { obj[rec.pathname] = rec; }
                    });
                    finish();
                };
                allReq.onerror = () => resolve('{}');
            });
            db.close();
            return text;
        }
        async function getSaveText() {
            const win = currentFrame && currentFrame.contentWindow;
            try { if (win && win.myflushAll) win.myflushAll(); } catch (e) {}
            if (win && win.fs && win.fs.exportStore) {
                try {
                    const blob = await new Promise((res) => win.fs.exportStore(res));
                    if (blob && blob.size > 0) return await blob.text();
                } catch (e) {}
            }
            return await readIDBToText();
        }
        async function loadSaveFromServer() {
            const status = document.getElementById('saveStatus');
            try {
                const res = await fetch('/api/load');
                if (res.status === 404) { if (status) status.textContent = '🆕 game mới'; return; }
                if (!res.ok) { if (status) status.textContent = '⚠ load lỗi'; return; }
                const text = await res.text();
                await importSaveToIDB(JSON.parse(text));
                if (status) status.textContent = '📥 đã tải save';
            } catch (e) {
                if (status) status.textContent = '⚠ tải lỗi';
            }
        }
        async function pushSave(wipe) {
            const status = document.getElementById('saveStatus');
            const text = await getSaveText();
            if (!text || text === '{}') { if (status) status.textContent = '⚠ chưa có dữ liệu'; return false; }
            const r = await fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: text });
            const j = await r.json();
            if (wipe) { try { await clearIDB(); } catch (e) {} }
            if (status) status.textContent = '✅ đã lưu (' + Math.round(j.size / 1024) + 'KB)';
            return true;
        }
        async function clearIDB() {
            const db = await openFsDB();
            await new Promise((resolve) => {
                const tx = db.transaction('fs4', 'readwrite');
                tx.objectStore('fs4').clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
            db.close();
        }
        async function exportSave(finalWipe) {
            const status = document.getElementById('saveStatus');
            try {
                if (status) status.textContent = '💾 đang lưu...';
                await pushSave(!!finalWipe);
            } catch (e) {
                if (status) status.textContent = '⚠ lưu lỗi';
            }
        }
        function startAutosave() {
            stopAutosave();
            autosaveTimer = setInterval(() => { if (currentFrame && !closing) exportSave(false); }, 8000);
        }
        function stopAutosave() { if (autosaveTimer) { clearInterval(autosaveTimer); autosaveTimer = null; } }

        async function closeEmulator() {
            if (closing || !currentFrame) return;
            closing = true;
            stopExitWatcher(); stopAutosave(); stopAutoFit(); stopAutoRotate();
            const status = document.getElementById('saveStatus');
            if (status) status.textContent = '💾 đang lưu...';
            await exportSave(true);
            document.getElementById('emulatorModal').style.display = 'none';
            document.getElementById('modalContent').style.transform = 'none';
            const frame = document.getElementById('emulatorFrame');
            currentFrame = null;
            if (keyListener) {
                document.removeEventListener('keydown', keyListener);
                document.removeEventListener('keyup', keyListener);
                keyListener = null;
            }
            frame.src = 'about:blank';
        }

        window.onload = () => {
            loadJars();
            document.getElementById('emulatorModal').onclick = function(e) {
                if (e.target.id === 'emulatorModal') closeEmulator();
            };
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (document.getElementById('emulatorModal').style.display === 'flex') closeEmulator();
                }
            });
        };
    </script>
</body>
</html>
