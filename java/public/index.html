<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>J2ME Portal</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f1a; color: #ddd;
            user-select: none; -webkit-user-select: none; overscroll-behavior: none;
        }

        /* ===== GALLERY (trang chọn game) ===== */
        #gallery { height: 100vh; display: flex; flex-direction: column; padding: 16px; }
        .header { text-align: center; margin-bottom: 16px; }
        .header h1 { color: #00d4ff; font-size: 24px; }
        .header p { color: #888; font-size: 12px; margin-top: 4px; }
        .jar-list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .jar-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding-bottom: 20px; }
        .jar-card { background: #1a1a2e; border-radius: 12px; padding: 12px; border: 1px solid #333; cursor: pointer; display: flex; gap: 10px; align-items: center; transition: 0.2s; }
        .jar-card:hover { border-color: #00d4ff; transform: translateY(-2px); }
        .game-icon { width: 40px; height: 40px; border-radius: 8px; background: #0a0a1e; object-fit: contain; image-rendering: pixelated; }
        .game-icon-placeholder { width: 40px; height: 40px; border-radius: 8px; background: #0a0a1e; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .game-info { flex: 1; min-width: 0; }
        .jar-name { color: white; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-res { font-size: 9px; color: #555; }
        .play-btn { background: #00d4ff; color: black; border: none; padding: 5px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; margin-top: 4px; width: 100%; }

        /* ===== GAME VIEW (Modal) ===== */
        #gameView {
            display: none; position: fixed; inset: 0; background: #050510; z-index: 9999;
            flex-direction: column;
        }
        #gameView.visible { display: flex; }
        .modal-header {
            background: #0a0a1e; padding: 4px 10px; display: flex; align-items: center; gap: 6px;
            flex: 0 0 auto; height: 32px; border-bottom: 1px solid #1a1a2e;
        }
        .modal-header h3 { color: #00d4ff; font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .save-status { color: #00c853; font-size: 10px; max-width: 60px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hdr-btn { border: none; width: 26px; height: 26px; border-radius: 5px; cursor: pointer; font-size: 13px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; }
        .close-btn { background: #ff4757; color: white; }
        .save-btn { background: #2d4a2d; color: #6cff6c; }
        .rotate-btn { background: #2d3a4a; color: #7cc4ff; }
        .pad-btn { background: #3a2d4a; color: #cc7cff; }
        .pad-btn.active { background: #5a4a6a; }
        .fs-btn { background: #2d4a3a; color: #7cffcc; }

        /* Vùng chứa game + gamepad */
        .game-body {
            flex: 1 1 auto; display: flex; flex-direction: column;
            min-height: 0; overflow: hidden;
        }
        /* screen-area: vùng đệm CHỐT CỨNG không gian, không bị ảnh hưởng bởi iframe */
        .screen-area {
            flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
            min-height: 0; overflow: hidden; padding: 4px;
        }
        /* screen-frame: khung đen bao quanh game, có kích thước pixel CHÍNH XÁC */
        .screen-frame {
            background: #000; border: 3px solid #1a1a2e; border-radius: 8px;
            flex: 0 0 auto; position: relative; overflow: hidden;
        }
        /* iframe: nằm trong screen-frame, scale bằng transform-origin top-left */
        .emulator-frame {
            display: block; border: none; transform-origin: top left; background: #000;
        }

        /* ===== VIRTUAL GAMEPAD (Nokia style: D-pad trái, Số phải) ===== */
        .gamepad {
            display: none; padding: 8px 4px; flex: 0 0 auto;
            justify-content: center; align-items: flex-start; gap: 24px;
            touch-action: none; width: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4));
        }
        .gamepad.visible { display: flex; }
        .gp-left { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .gp-right { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        
        .soft-keys { display: flex; gap: 8px; justify-content: space-between; width: 100%; }
        .soft-key {
            flex: 1; height: 24px; border-radius: 4px; background: #1a1a3e; color: #888;
            border: 1px solid #2a2a4e; font-size: 10px; display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }
        .soft-key:active { background: #3a3a5e; }

        .dpad-wrap { position: relative; width: 120px; height: 120px; }
        .dpad-btn {
            position: absolute; background: #1a2a3e; color: #6ab4ff; border: 1px solid #2a3a4e;
            display: flex; align-items: center; justify-content: center; touch-action: none;
            font-size: 18px;
        }
        .dpad-btn:active { background: #2a4a6e; }
        .dpad-up { top: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; border-radius: 6px 6px 0 0; }
        .dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; border-radius: 0 0 6px 6px; }
        .dpad-left { left: 0; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 6px 0 0 6px; }
        .dpad-right { right: 0; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 0 6px 6px 0; }
        .dpad-center {
            left: 50%; top: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px;
            border-radius: 50%; background: #1a3a2e; color: #6affb4; font-size: 10px;
        }
        .dpad-center:active { background: #2a6e5a; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 132px; }
        .num-btn {
            width: 42px; height: 34px; border-radius: 6px; background: #2a1a1e; color: #ff8a8a;
            border: 1px solid #3a2a2e; font-size: 13px; display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }
        .num-btn:active { background: #4a2a2e; }
        .game-btns { display: flex; gap: 6px; justify-content: center; }
        .game-btn { width: 36px; height: 26px; border-radius: 6px; background: #2a2a1e; color: #ffcc6a; border: 1px solid #3a3a2e; font-size: 11px; touch-action: none; }
        .game-btn:active { background: #4a4a2e; }

        /* Mobile nhỏ: thu nhỏ phím */
        @media (max-width: 400px) {
            .dpad-wrap { width: 100px; height: 100px; }
            .dpad-up, .dpad-down, .dpad-left, .dpad-right { width: 34px; height: 34px; }
            .dpad-center { width: 38px; height: 38px; }
            .numpad { width: 114px; }
            .num-btn { width: 36px; height: 30px; font-size: 12px; }
            .game-btn { width: 32px; }
            .gamepad { gap: 12px; padding: 4px; }
        }
    </style>
</head>
<body>
    <!-- GALLERY -->
    <div id="gallery">
        <div class="header">
            <h1>🎮 J2ME Portal</h1>
            <p>Chọn game để chơi</p>
        </div>
        <div id="status" style="text-align:center;color:#00c853;font-size:12px;margin-bottom:12px"></div>
        <div class="jar-list-wrap">
            <div id="jarList" class="jar-list"></div>
        </div>
    </div>

    <!-- GAME VIEW -->
    <div id="gameView">
        <div class="modal-header">
            <h3 id="modalTitle">Game</h3>
            <span id="saveStatus" class="save-status">💾</span>
            <button class="hdr-btn save-btn" title="Lưu" onclick="exportSave(false)">💾</button>
            <button class="hdr-btn rotate-btn" title="Xoay" onclick="rotateGame()">↻</button>
            <button class="hdr-btn pad-btn" id="padToggle" title="Bàn phím" onclick="toggleGamepad()">📱</button>
            <button class="hdr-btn fs-btn" title="Toàn màn hình" onclick="toggleFullscreen()">⛶</button>
            <button class="hdr-btn close-btn" title="Đóng" onclick="closeEmulator()">×</button>
        </div>
        <div class="game-body" id="gameBody">
            <div class="screen-area" id="screenArea">
                <div class="screen-frame" id="screenFrame">
                    <iframe id="emulatorFrame" class="emulator-frame"></iframe>
                </div>
            </div>
            <div class="gamepad" id="gamepad">
                    <div class="gp-left">
                        <div class="soft-keys">
                            <button class="soft-key" data-code="-6">L</button>
                            <button class="soft-key" data-code="-7">R</button>
                        </div>
                        <div class="dpad-wrap">
                            <button class="dpad-btn dpad-up" data-code="-1">▲</button>
                            <button class="dpad-btn dpad-left" data-code="-3">◀</button>
                            <button class="dpad-btn dpad-center" data-code="-5">OK</button>
                            <button class="dpad-btn dpad-right" data-code="-4">▶</button>
                            <button class="dpad-btn dpad-down" data-code="-2">▼</button>
                        </div>
                    </div>
                    <div class="gp-right">
                        <div class="numpad">
                            <button class="num-btn" data-code="49">1</button><button class="num-btn" data-code="50">2</button><button class="num-btn" data-code="51">3</button>
                            <button class="num-btn" data-code="52">4</button><button class="num-btn" data-code="53">5</button><button class="num-btn" data-code="54">6</button>
                            <button class="num-btn" data-code="55">7</button><button class="num-btn" data-code="56">8</button><button class="num-btn" data-code="57">9</button>
                            <button class="num-btn" data-code="42">*</button><button class="num-btn" data-code="48">0</button><button class="num-btn" data-code="35">#</button>
                        </div>
                        <div class="game-btns">
                            <button class="game-btn" data-code="122">C</button>
                            <button class="game-btn" data-code="99">D</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFrame = null, keyListener = null, exitWatcher = null, autosaveTimer = null, autofitTimer = null, autoRotateTimer = null, autoRotateAttempts = 0, autoRotateTried = false, closing = false, gamepadVisible = false, isFullscreen = false;

        async function loadJars() {
            const container = document.getElementById('jarList');
            try {
                const res = await fetch('/api/jars');
                const data = await res.json();
                if (data.error || !data.games?.length) { container.innerHTML = '<div style="color:#ff6b6b;text-align:center">Không tìm thấy game</div>'; return; }
                document.getElementById('status').innerHTML = '✅ ' + data.games.length + ' game';
                container.innerHTML = '';
                data.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'jar-card';
                    let iconHtml = game.hasIcon
                        ? '<img class="game-icon" src="/api/icon/' + game.id + '" onerror="this.outerHTML=\'<div class=game-icon-placeholder>🎮</div>\'">'
                        : '<div class="game-icon-placeholder">🎮</div>';
                    const r = game.resolution;
                    const resBadge = r ? '<div class="game-res">' + r.width + '×' + r.height + '</div>' : '';
                    card.innerHTML = iconHtml + '<div class="game-info"><div class="jar-name">' + game.name + '</div>' + resBadge + '<button class="play-btn">▶ Chơi</button></div>';
                    card.onclick = () => launchGame(game.id, game.name);
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = '<div style="color:#ff6b6b;text-align:center">Lỗi server</div>'; }
        }

        async function launchGame(gameId, gameName) {
            document.getElementById('modalTitle').textContent = gameName || 'Game';
            document.getElementById('gameView').classList.add('visible');
            currentFrame = document.getElementById('emulatorFrame');
            autoRotateTried = false; closing = false;
            document.getElementById('saveStatus').textContent = '⏳';
            try {
                await loadSaveFromServer();
                const r = await fetch('/api/launch?id=' + encodeURIComponent(gameId));
                const data = await r.json();
                if (data.success) {
                    currentFrame.src = data.url;
                    setTimeout(() => { setupKeyboardMapping(currentFrame); hookExit(currentFrame); startAutosave(); startAutoFit(); startAutoRotate(); currentFrame.focus(); }, 2000);
                    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) showGamepad();
                } else if (data.error) { currentFrame.srcdoc = '<h3 style="color:red;padding:30px">' + data.error + '</h3>'; }
            } catch (e) { currentFrame.srcdoc = '<h3 style="color:red;padding:30px">Lỗi</h3>'; }
        }

        function toggleFullscreen() {
            const el = document.getElementById('gameView');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
                isFullscreen = true;
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
                isFullscreen = false;
            }
            setTimeout(() => fitFrame(), 300);
        }
        document.addEventListener('fullscreenchange', () => setTimeout(() => fitFrame(), 200));
        document.addEventListener('webkitfullscreenchange', () => setTimeout(() => fitFrame(), 200));

        function toggleGamepad() { gamepadVisible ? hideGamepad() : showGamepad(); }
        function showGamepad() { gamepadVisible = true; document.getElementById('gamepad').classList.add('visible'); document.getElementById('padToggle').classList.add('active'); setTimeout(() => fitFrame(), 50); }
        function hideGamepad() { gamepadVisible = false; document.getElementById('gamepad').classList.remove('visible'); document.getElementById('padToggle').classList.remove('active'); setTimeout(() => fitFrame(), 50); }

        function sendKeyRaw(code, isPress) {
            try {
                const win = currentFrame && currentFrame.contentWindow;
                if (!win || !win.MIDP) return;
                if (isPress && win.MIDP.sendKeyPress) win.MIDP.sendKeyPress(code);
                else if (!isPress && win.MIDP.sendKeyRelease) win.MIDP.sendKeyRelease(code);
            } catch (e) {}
        }
        function bindGamepadButtons() {
            document.querySelectorAll('[data-code]').forEach(btn => {
                const code = parseInt(btn.dataset.code, 10);
                const press = function(e) { e.preventDefault(); e.stopPropagation(); sendKeyRaw(code, true); };
                const release = function(e) { e.preventDefault(); e.stopPropagation(); sendKeyRaw(code, false); };
                btn.addEventListener('touchstart', press, { passive: false });
                btn.addEventListener('touchend', release, { passive: false });
                btn.addEventListener('touchcancel', release, { passive: false });
                btn.addEventListener('mousedown', press);
                btn.addEventListener('mouseup', release);
                btn.addEventListener('mouseleave', release);
            });
        }

        function rotateGame() {
            if (!currentFrame || closing) return;
            const m = currentFrame.src.match(/canvasSize=size-(\d+)x(\d+)/);
            if (!m) return;
            currentFrame.src = currentFrame.src.replace(/canvasSize=size-\d+x\d+/, 'canvasSize=size-' + m[2] + 'x' + m[1]);
            autoRotateTried = true; stopAutoRotate(); startAutoFit();
        }
        function startAutoRotate() { stopAutoRotate(); autoRotateAttempts = 0; autoRotateTimer = setInterval(() => { if (!currentFrame || closing) { stopAutoRotate(); return; } if (++autoRotateAttempts > 10) { stopAutoRotate(); return; } autoDetectOrientation(); }, 1000); }
        function stopAutoRotate() { if (autoRotateTimer) { clearInterval(autoRotateTimer); autoRotateTimer = null; } }
        function autoDetectOrientation() {
            if (autoRotateTried || !currentFrame || closing) return;
            try {
                const doc = currentFrame.contentWindow && currentFrame.contentWindow.document; if (!doc) return;
                const canvas = doc.getElementById('canvas'); if (!canvas || !canvas.width || !canvas.height) return;
                const ctx = canvas.getContext('2d'); if (!ctx) return;
                const w = canvas.width, h = canvas.height; let q = [0,0,0,0], total = 0;
                for (let y = 0; y < h; y += 2) for (let x = 0; x < w; x += 2) { const d = ctx.getImageData(x, y, 1, 1).data; const bg = (d[0]<8&&d[1]<8&&d[2]<8) || (d[0]>247&&d[1]>247&&d[2]>247); if (!bg) { q[(x<w/2?0:1)+(y<h/2?0:2)]++; total++; } }
                if (total < 50) return;
                if (total / ((w/2)*(h/2)) < 0.55) { const tc=q[0]+q[1], bc=q[2]+q[3], lc=q[0]+q[2], rc=q[1]+q[3]; if (h>w && tc>0 && bc<tc*0.25) { rotateGame(); return; } if (w>h && lc>0 && rc<lc*0.25) { rotateGame(); return; } }
            } catch(e) {}
        }

        function setupKeyboardMapping(iframe) {
            const keyMap = { 'w':-1,'a':-3,'s':-2,'d':-4,'q':-6,'e':-7,'z':122,'c':99,' ':-5,'0':48,'1':49,'2':50,'3':51,'4':52,'5':53,'6':54,'7':55,'8':56,'9':57,'*':42,'#':35 };
            if (keyListener) { document.removeEventListener('keydown', keyListener); document.removeEventListener('keyup', keyListener); }
            keyListener = function(e) { if (!currentFrame) return; const code = keyMap[e.key.toLowerCase()]; if (code !== undefined) { e.preventDefault(); sendKeyRaw(code, e.type === 'keydown'); } };
            document.addEventListener('keydown', keyListener);
            document.addEventListener('keyup', keyListener);
        }

        function startAutoFit() { stopAutoFit(); autofitTimer = setInterval(() => { if (currentFrame && !closing) fitFrame(); }, 400); }
        function stopAutoFit() { if (autofitTimer) { clearInterval(autofitTimer); autofitTimer = null; } }
        function fitFrame() {
            const frame = document.getElementById('emulatorFrame');
            const screenFrame = document.getElementById('screenFrame');
            const screenArea = document.getElementById('screenArea');
            try {
                const doc = frame.contentWindow && frame.contentWindow.document; if (!doc) return;
                const canvas = doc.getElementById('canvas'); if (!canvas || !canvas.width || !canvas.height) return;
                const cw = canvas.width, ch = canvas.height;
                if (cw === frame._fitW && ch === frame._fitH && !frame._fitDirty) return;
                frame._fitW = cw; frame._fitH = ch; frame._fitDirty = false;
                
                const maxW = screenArea.clientWidth - 8;
                const maxH = screenArea.clientHeight - 8;
                if (maxW <= 0 || maxH <= 0) return;

                const scale = Math.min(maxW / cw, maxH / ch);
                const realW = Math.floor(cw * scale);
                const realH = Math.floor(ch * scale);
                
                screenFrame.style.width = realW + 'px';
                screenFrame.style.height = realH + 'px';
                
                frame.style.width = cw + 'px';
                frame.style.height = ch + 'px';
                frame.style.transform = 'scale(' + scale + ')';
            } catch(e) {}
        }

        function hookExit(iframe) {
            let win; try { win = iframe.contentWindow; } catch(e) { return; }
            if (!win) return;
            if (typeof win.showExitScreen === 'function') { win.showExitScreen = function() { try { if (win.myflushAll) win.myflushAll(); } catch(e){} handleGameExit('thoát'); }; }
            stopExitWatcher();
            exitWatcher = setInterval(() => { if (!currentFrame || closing) { stopExitWatcher(); return; } try { const w = iframe.contentWindow; if (!w) return; const href = (w.location && w.location.href) || ''; if (href && !href.includes('main.html')) { handleGameExit('rời trang'); return; } const d = w.document; const es = d && d.getElementById('exit-screen'); if (es && es.style && es.style.display === 'block') { handleGameExit('exit'); return; } } catch(e) {} }, 350);
        }
        function stopExitWatcher() { if (exitWatcher) { clearInterval(exitWatcher); exitWatcher = null; } }
        async function handleGameExit(reason) {
            if (closing || !currentFrame) return; closing = true;
            stopExitWatcher(); stopAutosave(); stopAutoFit(); stopAutoRotate();
            document.getElementById('saveStatus').textContent = '💾 ' + reason;
            await exportSave(true);
            document.getElementById('gameView').classList.remove('visible');
            if (isFullscreen) { (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document); isFullscreen = false; }
            hideGamepad(); currentFrame = null;
            if (keyListener) { document.removeEventListener('keydown', keyListener); document.removeEventListener('keyup', keyListener); keyListener = null; }
            document.getElementById('emulatorFrame').src = 'about:blank';
        }

        function openFsDB() { return new Promise((resolve, reject) => { const req = indexedDB.open('asyncStorage', 4); req.onupgradeneeded = (ev) => { const d = ev.target.result; if (!d.objectStoreNames.contains('fs4')) { const os = d.createObjectStore('fs4', { keyPath: 'pathname' }); os.createIndex('parentDir', 'parentDir', { unique: false }); } }; req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
        async function importSaveToIDB(saveObj) { const db = await openFsDB(); await new Promise((resolve, reject) => { const tx = db.transaction('fs4', 'readwrite'); tx.objectStore('fs4').clear(); for (const p in saveObj) { const r = saveObj[p]; if (!r) continue; if (!r.isDir && Array.isArray(r.data)) { try { r.data = new Blob([new Int8Array(r.data)]); } catch(e){} } r.pathname = p; tx.objectStore('fs4').put(r); } tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); }); db.close(); }
        async function readIDBToText() { let db; try { db = await openFsDB(); } catch(e) { return '{}'; } if (!db.objectStoreNames.contains('fs4')) { db.close(); return '{}'; } const text = await new Promise((resolve) => { const tx = db.transaction('fs4', 'readonly'); const rq = tx.objectStore('fs4').getAll(); rq.onsuccess = () => { const recs = rq.result || []; const obj = {}; let pending = 0, done = false; const finish = () => { if (pending === 0 && !done) { done = true; resolve(JSON.stringify(obj)); } }; recs.forEach(rec => { if (!rec || !rec.pathname) return; if (!rec.isDir && rec.data instanceof Blob) { pending++; const reader = new FileReader(); reader.onload = () => { rec.data = Array.prototype.slice.call(new Int8Array(reader.result)); obj[rec.pathname] = rec; pending--; finish(); }; reader.onerror = () => { obj[rec.pathname] = rec; pending--; finish(); }; reader.readAsArrayBuffer(rec.data); } else { obj[rec.pathname] = rec; } }); finish(); }; rq.onerror = () => resolve('{}'); }); db.close(); return text; }
        async function getSaveText() { const win = currentFrame && currentFrame.contentWindow; try { if (win && win.myflushAll) win.myflushAll(); } catch(e) {} if (win && win.fs && win.fs.exportStore) { try { const blob = await new Promise((res) => win.fs.exportStore(res)); if (blob && blob.size > 0) return await blob.text(); } catch(e) {} } return await readIDBToText(); }
        async function loadSaveFromServer() { const status = document.getElementById('saveStatus'); try { const res = await fetch('/api/load'); if (res.status === 404) { if (status) status.textContent = '🆕'; return; } if (!res.ok) return; await importSaveToIDB(JSON.parse(await res.text())); if (status) status.textContent = '📥'; } catch(e) {} }
        async function exportSave(finalWipe) { const status = document.getElementById('saveStatus'); try { if (status) status.textContent = '💾...'; const text = await getSaveText(); if (!text || text === '{}') { if (status) status.textContent = '⚠'; return; } const r = await fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: text }); const j = await r.json(); if (finalWipe) { try { const db = await openFsDB(); await new Promise((res) => { const tx = db.transaction('fs4', 'readwrite'); tx.objectStore('fs4').clear(); tx.oncomplete = res; tx.onerror = res; }); db.close(); } catch(e) {} } if (status) status.textContent = '✅'; } catch(e) { if (status) status.textContent = '⚠'; } }
        function startAutosave() { stopAutosave(); autosaveTimer = setInterval(() => { if (currentFrame && !closing) exportSave(false); }, 8000); }
        function stopAutosave() { if (autosaveTimer) { clearInterval(autosaveTimer); autosaveTimer = null; } }

        async function closeEmulator() {
            if (closing || !currentFrame) return; closing = true;
            stopExitWatcher(); stopAutosave(); stopAutoFit(); stopAutoRotate();
            document.getElementById('saveStatus').textContent = '💾...';
            await exportSave(true);
            document.getElementById('gameView').classList.remove('visible');
            if (isFullscreen) { (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document); isFullscreen = false; }
            hideGamepad(); currentFrame = null;
            if (keyListener) { document.removeEventListener('keydown', keyListener); document.removeEventListener('keyup', keyListener); keyListener = null; }
            document.getElementById('emulatorFrame').src = 'about:blank';
        }

        window.addEventListener('DOMContentLoaded', () => {
            bindGamepadButtons(); loadJars();
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && document.getElementById('gameView').classList.contains('visible')) closeEmulator(); });
            window.addEventListener('resize', () => { if (currentFrame) { currentFrame._fitDirty = true; fitFrame(); } });
            window.addEventListener('orientationchange', () => { setTimeout(() => { if (currentFrame) { currentFrame._fitDirty = true; fitFrame(); } }, 300); });
        });
    </script>
</body>
