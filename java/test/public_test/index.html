<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mode5 Test Debug</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:#0f0f1a;color:#ddd}
    #gallery{height:100vh;display:flex;flex-direction:column;padding:16px} .header{text-align:center;margin-bottom:16px}
    .jar-list-wrap{flex:1;overflow:auto}.jar-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    .jar-card{background:#1a1a2e;border-radius:12px;padding:12px;border:1px solid #333;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
    .jar-card:hover{border-color:#00d4ff}
    .game-icon{width:40px;height:40px;border-radius:8px;background:#0a0a1e;object-fit:contain;image-rendering:pixelated;flex:0 0 auto}
    .game-icon-placeholder{width:40px;height:40px;border-radius:8px;background:#0a0a1e;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:18px}
    .game-info{flex:1;min-width:0}
    .jar-name{color:#fff;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .game-res{font-size:10px;color:#888;margin-top:2px}
    .meta-line{font-size:10px;color:#7a7a95;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta-line.file{color:#555;font-size:9px;font-style:italic}
    .play-btn{background:#00d4ff;color:#000;border:none;padding:5px 10px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:11px;margin-top:6px;width:100%}
    #gameView{display:none;position:fixed;inset:0;background:#0a0a0f;z-index:9999;flex-direction:column} #gameView.visible{display:flex}
    .modal-header{background:#0e0e16;padding:4px 10px;display:flex;align-items:center;gap:6px;height:32px;border-bottom:1px solid #1a1a2e}
    .modal-header h3{color:#00d4ff;font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hdr-btn{border:none;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
    .close-btn{background:#ff4757;color:#fff}.pad-btn{background:#3a2d4a;color:#cc7cff}.pad-btn.active{background:#5a4a6a}.fs-btn{background:#2d4a3a;color:#7cffcc}.debug-btn{background:#2d3a4a;color:#7cc4ff}
    .game-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}.screen-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden;padding:4px}.screen-frame{background:#000;border:3px solid #1a1a2e;border-radius:8px;position:relative;overflow:hidden}.emulator-frame{display:block;border:none;transform-origin:top left;background:#000}
    .gamepad{display:none;padding:8px 0 12px;flex-direction:column;align-items:center;width:100%;background:#0a0a0f;border-top:1px solid #1a1a22}.gamepad.visible{display:flex}
    .soft-row{display:flex;gap:10px;margin-bottom:10px}.soft-key,.num-btn,.dpad-btn{min-width:56px;height:42px;border-radius:10px;border:1px solid #333;background:#222;color:#ddd;font-weight:700;cursor:pointer}
    .dpad-grid{display:grid;grid-template-columns:repeat(3,60px);gap:8px;justify-content:center;align-items:center;margin-bottom:10px}.numpad{display:grid;grid-template-columns:repeat(3,60px);gap:8px}
    #status{margin-bottom:8px;color:#00c853;font-size:12px;text-align:center}
  </style>
</head>
<body>
<div id="gallery">
  <div class="header"><h1>🎮 Mode5 Test Debug</h1><p>Chỉ để test Mode5 trên máy local</p></div>
  <div id="status">Đang tải...</div>
  <input id="searchBox" type="text" placeholder="🔍 Tìm game... (nhập ít nhất 3 ký tự)" style="width:100%;padding:10px 14px;margin-bottom:10px;border-radius:10px;border:1px solid #333;background:#1a1a2e;color:#ddd;font-size:14px;outline:none;box-sizing:border-box;">
  <div id="searchHint" style="font-size:11px;color:#888;margin:-6px 0 10px 4px;min-height:14px;"></div>
  <div class="jar-list-wrap"><div id="jarList" class="jar-list"></div></div>
</div>
<div id="gameView">
  <div class="modal-header">
    <h3 id="modalTitle">Game</h3>
    <button class="hdr-btn debug-btn" onclick="reloadJarList()">↺</button>
    <button class="hdr-btn pad-btn" id="padToggle" onclick="toggleGamepad()">📱</button>
    <button class="hdr-btn fs-btn" onclick="toggleFullscreen()">⛶</button>
    <button class="hdr-btn close-btn" onclick="closeEmulator()">×</button>
  </div>
  <div class="game-body">
    <div class="screen-area" id="screenArea"><div class="screen-frame" id="screenFrame"><iframe id="emulatorFrame" class="emulator-frame" sandbox="allow-scripts allow-same-origin allow-pointer-lock" allow="fullscreen; gamepad; autoplay"></iframe></div></div>
    <div class="gamepad" id="gamepad">
      <div class="soft-row"><button class="soft-key" data-code="-6">L</button><button class="soft-key" data-code="122">C</button><button class="soft-key" data-code="99">D</button><button class="soft-key" data-code="-7">R</button></div>
      <div class="dpad-grid">
        <div></div><button class="dpad-btn" data-code="-1">▲</button><div></div>
        <button class="dpad-btn" data-code="-3">◀</button><button class="dpad-btn" data-code="-5">OK</button><button class="dpad-btn" data-code="-4">▶</button>
        <div></div><button class="dpad-btn" data-code="-2">▼</button><div></div>
      </div>
      <div class="numpad">
        <button class="num-btn" data-code="49">1</button><button class="num-btn" data-code="50">2</button><button class="num-btn" data-code="51">3</button>
        <button class="num-btn" data-code="52">4</button><button class="num-btn" data-code="53">5</button><button class="num-btn" data-code="54">6</button>
        <button class="num-btn" data-code="55">7</button><button class="num-btn" data-code="56">8</button><button class="num-btn" data-code="57">9</button>
        <button class="num-btn" data-code="42">*</button><button class="num-btn" data-code="48">0</button><button class="num-btn" data-code="35">#</button>
      </div>
    </div>
  </div>
</div>
<script>
let currentFrame=null,currentGameId=null,currentEngineKind='cheerpj',gameReady=false,gamepadVisible=false;
let allGames=[];
let randomRank=new Map();
let searchDebounceTimer=null;
let runnerOrigin='';
let watchdogTimer=null;
let watchdogSeq=0;
let lastRunnerAlive=0;
const SEARCH_DEBOUNCE_MS=1200;
const SEARCH_MIN_CHARS=3;
const DEFAULT_RANDOM_LIMIT=10;
const WATCHDOG_INTERVAL_MS=1000;
const WATCHDOG_TIMEOUT_MS=5000;
function dbg(){const line=[...arguments].map(v=>typeof v==='object'?JSON.stringify(v):String(v)).join(' '); console.log('[UI]',line);}
function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function assignRandomRanks(){ randomRank=new Map(); const ids=[...new Set(allGames.map(g=>g.id))]; ids.forEach(id=>randomRank.set(id,Math.random())); }
function getSearchQuery(){ return (document.getElementById('searchBox')?.value||'').trim(); }
function isSearchActive(){ return getSearchQuery().length>=SEARCH_MIN_CHARS; }
function getFilteredGames(){ const q=getSearchQuery().toLowerCase(); if(!isSearchActive()) return allGames.slice(); return allGames.filter(g=> (g.name||'').toLowerCase().includes(q) || (g.file||'').toLowerCase().includes(q)); }
function getVisibleGames(){ const filtered=getFilteredGames(); if(isSearchActive()) return { games: filtered, limited:false, total:filtered.length }; const sorted=filtered.slice().sort((a,b)=>(randomRank.get(a.id)??0)-(randomRank.get(b.id)??0)); return { games: sorted.slice(0,DEFAULT_RANDOM_LIMIT), limited: sorted.length>DEFAULT_RANDOM_LIMIT, total: filtered.length }; }
function iconHtmlFor(game){
  return game.hasIcon
    ? '<img class="game-icon" src="/api/icon/'+encodeURIComponent(game.id)+'" onerror="this.outerHTML=\'<div class=game-icon-placeholder>🎮<\\/div>\'">'
    : '<div class="game-icon-placeholder">🎮</div>';
}
function renderGameList(){
  const container=document.getElementById('jarList');
  const status=document.getElementById('status');
  const hint=document.getElementById('searchHint');
  if(!container) return;
  const q=getSearchQuery();
  const visible=getVisibleGames();
  container.innerHTML='';
  if(!visible.games.length){
    container.innerHTML='<div style="color:#ff6b6b;text-align:center">Không tìm thấy game</div>';
    if(status) status.textContent='Không có kết quả';
    return;
  }
  visible.games.forEach(game=>{
    const r=game.resolution||{};
    const card=document.createElement('div');
    card.className='jar-card';
    const resLine='<div class="game-res">'+(r.width||'?')+'×'+(r.height||'?')+'</div>';
    const devLine='<div class="meta-line">Dev: '+escapeHtml(game.dev||'Unknown')+'</div>';
    const profLine='<div class="meta-line">'+escapeHtml(game.profile||'Unknown')+(game.config?' • '+escapeHtml(game.config):'')+(game.version?' • v'+escapeHtml(game.version):'')+'</div>';
    const fileLine='<div class="meta-line file">'+escapeHtml(game.file||'')+'</div>';
    card.innerHTML=iconHtmlFor(game)+'<div class="game-info"><div class="jar-name">'+escapeHtml(game.name)+'</div>'+resLine+devLine+profLine+fileLine+'<button class="play-btn">▶ Chơi mode5</button></div>';
    card.onclick=()=>launchGame(game.id,game.name);
    container.appendChild(card);
  });
  if(status){
    if(isSearchActive()) status.textContent='Có '+allGames.length+' game • kết quả tìm kiếm: '+visible.games.length;
    else status.textContent='Có '+allGames.length+' game • đang hiển thị ngẫu nhiên '+visible.games.length+'/'+visible.total;
  }
  if(hint){
    if(q.length===0) hint.textContent='';
    else if(q.length<SEARCH_MIN_CHARS) hint.textContent='Nhập ít nhất '+SEARCH_MIN_CHARS+' ký tự để tìm ('+q.length+'/'+SEARCH_MIN_CHARS+'). Hiện chỉ hiển thị 10 game ngẫu nhiên để tránh lag.';
    else hint.textContent='Đã lọc theo: "'+q+'"';
  }
  dbg('renderGameList visible='+visible.games.length+' total='+visible.total+' searchActive='+isSearchActive());
}
function onSearchInputDebounced(){ const q=getSearchQuery(); const hint=document.getElementById('searchHint'); if(searchDebounceTimer){ clearTimeout(searchDebounceTimer); searchDebounceTimer=null; } if(q.length===0){ if(hint) hint.textContent=''; renderGameList(); return; } if(q.length<SEARCH_MIN_CHARS){ renderGameList(); return; } if(hint) hint.textContent='Đang chờ gõ xong '+(SEARCH_DEBOUNCE_MS/1000)+'s...'; searchDebounceTimer=setTimeout(()=>{ searchDebounceTimer=null; renderGameList(); }, SEARCH_DEBOUNCE_MS); }
async function loadJars(){dbg('loadJars start'); try{const res=await fetch('/api/jars'); const data=await res.json(); allGames=data.games||[]; assignRandomRanks(); renderGameList(); dbg('loadJars done count='+allGames.length);}catch(e){dbg('loadJars error',e&&e.message||e); document.getElementById('status').textContent='Lỗi tải game';}}
function stopRunnerWatchdog(){ if(watchdogTimer){ clearInterval(watchdogTimer); watchdogTimer=null; } }
function killRunnerIframe(reason){ stopRunnerWatchdog(); try{ const oldFrame=document.getElementById('emulatorFrame'); if(oldFrame){ oldFrame.onload=null; oldFrame.src='about:blank'; oldFrame.remove(); } }catch(e){} const screenFrame=document.getElementById('screenFrame'); const fresh=document.createElement('iframe'); fresh.id='emulatorFrame'; fresh.className='emulator-frame'; fresh.setAttribute('sandbox','allow-scripts allow-same-origin allow-pointer-lock'); fresh.setAttribute('allow','fullscreen; gamepad; autoplay'); fresh.srcdoc='<body style="margin:0;background:#000;color:#ff7675;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;box-sizing:border-box"><div>'+escapeHtml(reason||'Runner bị kill.')+'<br><br>Bấm đóng hoặc mở lại game.</div></body>'; if(screenFrame){ screenFrame.appendChild(fresh); } currentFrame=fresh; gameReady=false; dbg('killRunnerIframe',reason||'Runner bị kill.'); }
function startRunnerWatchdog(){ stopRunnerWatchdog(); lastRunnerAlive=Date.now(); watchdogTimer=setInterval(()=>{ const frame=document.getElementById('emulatorFrame'); if(!frame||!frame.contentWindow) return; const now=Date.now(); try{ frame.contentWindow.postMessage({ type:'parent-ping', id:++watchdogSeq, ts:now }, runnerOrigin||'*'); }catch(e){ dbg('watchdog ping error',e&&e.message||e); } if(now-lastRunnerAlive>WATCHDOG_TIMEOUT_MS){ dbg('runner timeout, remove iframe'); killRunnerIframe('Runner không phản hồi '+WATCHDOG_TIMEOUT_MS+'ms. Đã kill iframe.'); } }, WATCHDOG_INTERVAL_MS); }
async function launchGame(gameId, gameName){dbg('launchGame',gameId,gameName); document.getElementById('modalTitle').textContent=gameName||'Game'; document.getElementById('gameView').classList.add('visible'); currentFrame=document.getElementById('emulatorFrame'); currentGameId=gameId; gameReady=false; stopRunnerWatchdog(); runnerOrigin=''; try{ const r=await fetch('/api/launch?id='+encodeURIComponent(gameId)); const data=await r.json(); dbg('launch response',data); if(data.success){ runnerOrigin=data.runnerOrigin || new URL(data.url, location.href).origin; currentFrame.src=data.url; currentFrame.onload=()=>{dbg('iframe onload',currentFrame.src); gameReady=true; fitFrame();}; showGamepad(); startRunnerWatchdog(); } else { currentFrame.srcdoc='<h3 style="color:red;padding:30px">'+escapeHtml(data.error||'Lỗi')+'</h3>'; } }catch(e){ dbg('launch error',e&&e.message||e); currentFrame.srcdoc='<h3 style="color:red;padding:30px">Lỗi</h3>'; }}
function legacyCodeToFreeJ2MEKey(code){const map={'-1':{key:'ArrowUp',code:'ArrowUp'},'-2':{key:'ArrowDown',code:'ArrowDown'},'-3':{key:'ArrowLeft',code:'ArrowLeft'},'-4':{key:'ArrowRight',code:'ArrowRight'},'-5':{key:'Enter',code:'Enter'},'-6':{key:'q',code:'KeyQ'},'-7':{key:'w',code:'KeyW'},'48':{key:'0',code:'Digit0'},'49':{key:'1',code:'Digit1'},'50':{key:'2',code:'Digit2'},'51':{key:'3',code:'Digit3'},'52':{key:'4',code:'Digit4'},'53':{key:'5',code:'Digit5'},'54':{key:'6',code:'Digit6'},'55':{key:'7',code:'Digit7'},'56':{key:'8',code:'Digit8'},'57':{key:'9',code:'Digit9'},'42':{key:'e',code:'KeyE'},'35':{key:'r',code:'KeyR'},'122':{key:'f1',code:'F1'},'99':{key:'f2',code:'F2'}}; return map[String(Number(code))]||null;}
function sendKeyRaw(code,isPress){ try{ const frame=document.getElementById('emulatorFrame'); const win=frame&&frame.contentWindow; if(!win||!gameReady){dbg('sendKeyRaw skipped ready='+gameReady); return;} const mapped=legacyCodeToFreeJ2MEKey(code); const vkMap={Enter:10,ArrowUp:38,ArrowDown:40,ArrowLeft:37,ArrowRight:39,KeyQ:81,KeyW:87,KeyE:69,KeyR:82,Digit0:48,Digit1:49,Digit2:50,Digit3:51,Digit4:52,Digit5:53,Digit6:54,Digit7:55,Digit8:56,Digit9:57}; const keyName=mapped?mapped.key:String(code); const codeName=mapped?mapped.code:''; const vkCode=vkMap[codeName] || (keyName.length===1?keyName.toUpperCase().charCodeAt(0):parseInt(code,10)||0); dbg('sendKeyRaw',JSON.stringify({code,isPress,keyName,codeName,vkCode})); win.postMessage({type:'cheerpj-key-command',key:keyName,code:codeName,keyCode:vkCode,isDown:isPress,midpCode:Number(code),source:'test-public-ui'}, runnerOrigin||'*'); }catch(e){dbg('sendKeyRaw error',e&&e.message||e);} }
function bindGamepadButtons(){ document.querySelectorAll('[data-code]').forEach(btn=>{ const code=parseInt(btn.dataset.code,10); const press=e=>{e.preventDefault(); btn.classList.add('pressed'); sendKeyRaw(code,true);}; const release=e=>{e.preventDefault(); btn.classList.remove('pressed'); sendKeyRaw(code,false);}; btn.addEventListener('mousedown',press); btn.addEventListener('mouseup',release); btn.addEventListener('mouseleave',release); btn.addEventListener('touchstart',press,{passive:false}); btn.addEventListener('touchend',release,{passive:false}); btn.addEventListener('touchcancel',release,{passive:false}); }); }
function fitFrame(){ const frame=document.getElementById('emulatorFrame'),screenFrame=document.getElementById('screenFrame'),screenArea=document.getElementById('screenArea'); if(!frame||!screenFrame||!screenArea)return; let cw=240,ch=320; try{ const src=frame.getAttribute('src')||frame.src||''; const qs=src.split('?')[1]||''; const p=new URLSearchParams(qs); cw=parseInt(p.get('width')||'240',10); ch=parseInt(p.get('height')||'320',10);}catch(e){} const maxW=screenArea.clientWidth-8,maxH=screenArea.clientHeight-8; if(maxW<=0||maxH<=0)return; const scale=Math.min(maxW/cw,maxH/ch); const realW=Math.floor(cw*scale),realH=Math.floor(ch*scale); screenFrame.style.width=realW+'px'; screenFrame.style.height=realH+'px'; frame.style.width=cw+'px'; frame.style.height=ch+'px'; frame.style.transform='scale('+scale+')'; dbg('fitFrame',JSON.stringify({cw,ch,maxW,maxH,scale,realW,realH})); }
function toggleFullscreen(){ const el=document.getElementById('gameView'); if(!document.fullscreenElement){ (el.requestFullscreen||function(){}).call(el);} else { (document.exitFullscreen||function(){}).call(document);} setTimeout(fitFrame,300); }
function toggleGamepad(){ gamepadVisible?hideGamepad():showGamepad(); }
function showGamepad(){ gamepadVisible=true; document.getElementById('gamepad').classList.add('visible'); document.getElementById('padToggle').classList.add('active'); setTimeout(fitFrame,50); }
function hideGamepad(){ gamepadVisible=false; document.getElementById('gamepad').classList.remove('visible'); document.getElementById('padToggle').classList.remove('active'); setTimeout(fitFrame,50); }
function closeEmulator(){ stopRunnerWatchdog(); runnerOrigin=''; const frame=document.getElementById('emulatorFrame'); if(frame){ frame.onload=null; frame.src='about:blank'; } currentFrame=null; currentGameId=null; gameReady=false; document.getElementById('gameView').classList.remove('visible'); hideGamepad(); dbg('closeEmulator'); }
function reloadJarList(){ loadJars(); }
window.addEventListener('message', function (ev) { const d=ev&&ev.data; if(!d) return; if(runnerOrigin && ev.origin !== runnerOrigin) return; if(d.type==='runner-pong' || d.type==='runner-heartbeat' || d.type==='runner-script-loaded' || d.type==='runner-cheerpj-init-start' || d.type==='runner-cheerpj-init-done'){ lastRunnerAlive=Date.now(); dbg('runner alive', d.type); } });
window.addEventListener('resize',()=>setTimeout(fitFrame,100));
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&document.getElementById('gameView').classList.contains('visible')) closeEmulator(); });
document.addEventListener('DOMContentLoaded',()=>{ bindGamepadButtons(); const sb=document.getElementById('searchBox'); if(sb){ sb.addEventListener('input', onSearchInputDebounced); sb.addEventListener('keydown', e=>{ if(e.key==='Enter'){ if(searchDebounceTimer){ clearTimeout(searchDebounceTimer); searchDebounceTimer=null; } renderGameList(); } }); } loadJars(); dbg('DOMContentLoaded done'); });
</script>

</html>
