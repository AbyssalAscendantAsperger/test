    <meta charset="utf-8" />
    <title>J2ME CheerpJ Mode 5 SAME-PORT</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; user-select: none; -webkit-user-select: none; }

    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const parentOrigin = params.get('parentOrigin') || location.origin;
        function safePostToParent(msg) {
          try { parent.postMessage(msg, parentOrigin === '*' ? '*' : parentOrigin); } catch (e) {}
        }
        window.__runnerPostToParent = safePostToParent;
        window.addEventListener('message', function (ev) {
          if (parentOrigin !== '*' && ev.origin !== parentOrigin) return;
          const d = ev && ev.data;
          if (!d) return;
          if (d.type === 'parent-ping') {
            safePostToParent({ type: 'runner-pong', id: d.id, ts: Date.now() });
          }
        });
        setInterval(function () { safePostToParent({ type: 'runner-heartbeat', ts: Date.now() }); }, 1000);
        safePostToParent({ type: 'runner-script-loaded', ts: Date.now(), href: location.href });
      })();
    </script>
    <script>
        function relayLog(level, args) {
          try {
            const msg = args.map(a => (typeof a === 'object' ? (a && (a.stack || JSON.stringify(a))) : String(a))).join(' ');
            fetch('/api/browser-log', { method: 'POST', body: '[V9-' + level + '] ' + msg, headers: { 'Content-Type': 'text/plain' } }).catch(()=>{});
          } catch(e){}
        }
        const oLog = console.log; console.log = function(...a) { oLog.apply(console, a); relayLog('INFO', a); };
        const oErr = console.error; console.error = function(...a) { oErr.apply(console, a); relayLog('ERROR', a); };
        const oWarn = console.warn; console.warn = function(...a) { oWarn.apply(console, a); relayLog('WARN', a); };
        const oDbg = console.debug; console.debug = function(...a) { try{oDbg && oDbg.apply(console, a);}catch(_){} relayLog('DEBUG', a); };
        window.onerror = function(m, u, l, c, e) { relayLog('FATAL', [m, 'at', l + ':' + c, e ? e.stack : '']); };
        window.onunhandledrejection = function(e) { relayLog('UNHANDLED', [e.reason ? (e.reason.stack || e.reason) : e]); };
        // [PATCH-L1] JS main-thread liveness ping: if this stops firing the browser tab
        // (or the CheerpJ worker owning the event loop) is dead. Independent from Java
        // side heartbeats, so we can tell where a hang really lives.
        (function(){
          let n = 0;
          setInterval(function(){ relayLog('PING', ['js-alive tick=' + (++n) + ' t=' + Date.now()]); }, 2000);
        })();
        async function Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication(lib, app) {
          window.__freej2meApp = app;
          console.log('[Mode5-KeyBridge] Java FreeJ2ME app instance exposed to JS. Direct virtual input enabled.');
          return new Promise(function(){ });
        }
    </script>
    <script>
        // Same key bridge as assets_pc/web5/cheerpj_run.html.
        (function(){
          let virtualKeyQueue = Promise.resolve();
          const keyState = new Map();

          function enqueueVirtualKey(midpCode, isDown) {
            const code = Number(midpCode || 0);
            if (!code) return false;
            if (!window.__freej2meApp || typeof window.__freej2meApp.virtualKeyFromJS !== 'function') return false;

            const prev = keyState.get(code) === true;
            if (prev === !!isDown) {
              console.log('[Mode5-KeyBridge] ignore duplicate direct midp=' + code + ' down=' + !!isDown);
              return true;
            }
            keyState.set(code, !!isDown);

            virtualKeyQueue = virtualKeyQueue.then(function(){
              return window.__freej2meApp.virtualKeyFromJS(code, !!isDown);
            }).catch(function(e){
              console.warn('[Mode5-KeyBridge] direct Java virtualKeyFromJS failed/rejected', e);
            });
            return true;
          }

          function dispatchSynthetic(d) {
            const type = d.isDown ? 'keydown' : 'keyup';
            const key = d.key || '';
            const code = d.code || '';
            const keyCode = Number(d.keyCode || 0);
            const charCode = 0;
            const evtInit = { key, code, bubbles: true, cancelable: true, composed: true };
            const evt = new KeyboardEvent(type, evtInit);
            [['keyCode', keyCode], ['which', keyCode], ['charCode', charCode]].forEach(function(pair) {
              try { Object.defineProperty(evt, pair[0], { get: function(){ return pair[1]; } }); } catch(e) {}
            });
            const container = document.getElementById('contenedor-juego');
            const canvas = container && (container.querySelector('canvas') || container.querySelector('[tabindex]'));
            try { if (container) container.focus(); } catch(e) {}
            [canvas, container, document.activeElement, document, window].forEach(function(t) {
              try { if (t && t.dispatchEvent) t.dispatchEvent(evt); } catch(e) {}
            });
            if (d.isDown && key && key.length === 1) {
              const kp = new KeyboardEvent('keypress', evtInit);
              [['keyCode', keyCode], ['which', keyCode], ['charCode', key.charCodeAt(0)]].forEach(function(pair) {
                try { Object.defineProperty(kp, pair[0], { get: function(){ return pair[1]; } }); } catch(e) {}
              });
              [canvas, container, document.activeElement, document, window].forEach(function(t) {
                try { if (t && t.dispatchEvent) t.dispatchEvent(kp); } catch(e) {}
              });
            }
          }

          window.addEventListener('message', function(ev) {
            const d = ev && ev.data;
            if (!d || d.type !== 'cheerpj-key-command') return;
            try {
              const type = d.isDown ? 'keydown' : 'keyup';
              const key = d.key || '';
              const codeName = d.code || '';
              const keyCode = Number(d.keyCode || 0);
              const midp = Number(d.midpCode || 0);

              if (enqueueVirtualKey(midp, !!d.isDown)) {
                console.log('[Mode5-KeyBridge] direct queued ' + type + ' key=' + key + ' code=' + codeName + ' keyCode=' + keyCode + ' midp=' + midp);
                return;
              }

              console.warn('[Mode5-KeyBridge] Java app instance not ready; falling back to synthetic KeyboardEvent');
              dispatchSynthetic(d);
              console.log('[Mode5-KeyBridge] synthetic ' + type + ' key=' + key + ' code=' + codeName + ' keyCode=' + keyCode + ' midp=' + midp);
            } catch(e) { console.warn('[Mode5-KeyBridge] failed', e); }
          }, false);

          window.addEventListener('blur', function(){ keyState.clear(); }, true);
          document.addEventListener('visibilitychange', function(){ if (document.hidden) keyState.clear(); }, true);
        })();
    </script>
    <script src="./cheerpj/4.3/loader.js"></script>

<body>
    <div id="contenedor-juego" tabindex="0"></div>
    <script>
        (async function () {
            console.log('🌐 Booting CheerpJ Mode 5 SAME-PORT 3015...');
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const w = parseInt(params.get('width') || '240', 10);
            const h = parseInt(params.get('height') || '320', 10);
            const cfg = params.get('cfg') || '';
            // [PATCH-L1] Web test build: debug mode is ON by default (this build's only
            // purpose is diagnostic). Explicitly pass ?debugmodefreej2me=0 to disable.
            const dbgParam = params.get('debugmodefreej2me');
            const debugMode = dbgParam === null ? true : (dbgParam === '1' || dbgParam === 'true');
            console.log('[V9-BOOT] debugmodefreej2me =', debugMode, '(url param=' + dbgParam + ')');
            const requestedJarUrl = params.get('jarUrl') || '';
            const displayH = h;

            const container = document.getElementById('contenedor-juego');
            container.style.width = w + 'px';
            container.style.height = displayH + 'px';

            console.log('⏳ Initializing CheerpJ VM...');
            await cheerpjInit({ natives: { Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication } });
            console.log('✅ CheerpJ VM initialized.');

            cheerpjCreateDisplay(w, displayH, container);
            try { container.focus(); } catch(e) {}
            console.log('🖥️ Display canvas attached.');

            let appJarUrl = requestedJarUrl || ("/app/emu/jar/" + encodeURIComponent(token) + ".jar");
            if (appJarUrl.indexOf('/emu/') === 0) appJarUrl = '/app' + appJarUrl;
            if (/^https?:\/\//i.test(appJarUrl)) appJarUrl = "/app/emu/jar/" + encodeURIComponent(token) + ".jar";
            console.log('🎯 ROM argument:', appJarUrl, cfg ? ('cfg=' + cfg) : 'cfg=<none>');
            if (debugMode) { console.log('🐛 Debug mode ENABLED via URL parameter'); }

            try {
              const runArgs = [
                  appJarUrl,
                  String(w),
                  String(h),
                  '1',
                  cfg
              ];
              if (debugMode) {
                  runArgs.push('--debugmodefreej2me');
              }
              await cheerpjRunMain(
                  'org.recompile.freej2me.FreeJ2ME',
                  '/app/web5/app/freej2me.jar:/app/web5/app/freej2me-sdl.jar',
                  ...runArgs
              );
              console.log('✨ cheerpjRunMain exited cleanly.');
            } catch (err) {
              console.error('❌ Exception in cheerpjRunMain:', err);
            }
        })();
    </script>
