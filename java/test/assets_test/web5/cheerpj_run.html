<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>TEST MODE5 DEBUG</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; display:flex; justify-content:center; align-items:center; }
    #contenedor-juego { position:relative; overflow:hidden; image-rendering:pixelated; outline:none; }
    #dbg { position:fixed; left:8px; right:8px; bottom:8px; max-height:30vh; overflow:auto; background:rgba(0,0,0,.78); color:#7CFF7C; font:12px/1.35 monospace; padding:8px; border:1px solid #234; white-space:pre-wrap; z-index:99999; }
  </style>
  <script>
    function relay(level, args) {
      try {
        const msg = args.map(a => typeof a === 'object' ? (a && (a.stack || JSON.stringify(a))) : String(a)).join(' ');
        const line = '[' + level + '] ' + msg;
        const box = document.getElementById('dbg');
        if (box) { box.textContent += line + '\n'; box.scrollTop = box.scrollHeight; }
        fetch('/api/browser-log', { method:'POST', headers:{'Content-Type':'text/plain'}, body: line }).catch(()=>{});
      } catch (e) {}
    }
    const _log = console.log, _warn = console.warn, _err = console.error;
    console.log = (...a) => { _log(...a); relay('LOG', a); };
    console.warn = (...a) => { _warn(...a); relay('WARN', a); };
    console.error = (...a) => { _err(...a); relay('ERR', a); };
    window.onerror = (m,u,l,c,e) => relay('FATAL', [m, u, l + ':' + c, e && e.stack || '']);
    window.onunhandledrejection = e => relay('PROMISE', [e.reason && (e.reason.stack || e.reason) || e]);

    async function Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication(lib, app) {
      window.__freej2meApp = app;
      console.log('nativeSetApplication ready');
      return new Promise(function(){});
    }

    (function(){
      let virtualKeyQueue = Promise.resolve();
      const keyState = new Map();
      function enqueueVirtualKey(midpCode, isDown) {
        const code = Number(midpCode || 0);
        if (!code) return false;
        if (!window.__freej2meApp || typeof window.__freej2meApp.virtualKeyFromJS !== 'function') return false;
        const prev = keyState.get(code) === true;
        if (prev === !!isDown) {
          console.log('ignore duplicate direct midp=' + code + ' down=' + !!isDown);
          return true;
        }
        keyState.set(code, !!isDown);
        virtualKeyQueue = virtualKeyQueue.then(() => {
          console.log('direct virtualKeyFromJS', code, !!isDown);
          return window.__freej2meApp.virtualKeyFromJS(code, !!isDown);
        }).catch(e => console.warn('virtualKeyFromJS failed', e));
        return true;
      }
      function dispatchSynthetic(d) {
        const type = d.isDown ? 'keydown' : 'keyup';
        const key = d.key || '';
        const code = d.code || '';
        const keyCode = Number(d.keyCode || 0);
        const evt = new KeyboardEvent(type, { key, code, bubbles:true, cancelable:true, composed:true });
        [['keyCode', keyCode], ['which', keyCode], ['charCode', 0]].forEach(([k,v]) => { try { Object.defineProperty(evt, k, { get: () => v }); } catch(e) {} });
        const container = document.getElementById('contenedor-juego');
        const canvas = container && (container.querySelector('canvas') || container.querySelector('[tabindex]'));
        [canvas, container, document.activeElement, document, window].forEach(t => { try { if (t && t.dispatchEvent) t.dispatchEvent(evt); } catch(e) {} });
      }
      window.addEventListener('message', function(ev) {
        const d = ev && ev.data;
        if (!d || d.type !== 'cheerpj-key-command') return;
        console.log('postMessage key', JSON.stringify(d));
        if (enqueueVirtualKey(d.midpCode, !!d.isDown)) return;
        console.warn('Java app not ready -> synthetic fallback');
        dispatchSynthetic(d);
      }, false);
      window.addEventListener('blur', () => keyState.clear(), true);
      document.addEventListener('visibilitychange', () => { if (document.hidden) keyState.clear(); }, true);
    })();
  </script>
  <script src="./cheerpj/4.3/loader.js"></script>
</head>
<body>
  <div id="contenedor-juego" tabindex="0"></div>
  <div id="dbg"></div>
  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const w = parseInt(params.get('width') || '240', 10);
      const h = parseInt(params.get('height') || '320', 10);
      const file = params.get('file') || '';
      const appJarUrl = '/app/emu/jar/' + encodeURIComponent(token) + '.jar';
      console.log('BOOT', { token, w, h, file, appJarUrl, href: location.href });

      const container = document.getElementById('contenedor-juego');
      container.style.width = w + 'px';
      container.style.height = h + 'px';

      console.log('cheerpjInit start');
      await cheerpjInit({ natives: { Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication } });
      console.log('cheerpjInit done');

      cheerpjCreateDisplay(w, h, container);
      console.log('cheerpjCreateDisplay done');

      try {
        await cheerpjRunMain(
          'org.recompile.freej2me.FreeJ2ME',
          '/app/web5/app/freej2me.jar:/app/web5/app/freej2me-sdl.jar',
          appJarUrl,
          String(w),
          String(h),
          '1',
          ''
        );
        console.log('cheerpjRunMain exited cleanly');
      } catch (err) {
        console.error('cheerpjRunMain failed', err);
      }
    })();
  </script>
</body>
</html>
