<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>TEST MODE5 DEBUG</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
    #contenedor-juego { position:fixed; inset:0; overflow:hidden; image-rendering:pixelated; outline:none; }
  </style>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const parentOrigin = params.get('parentOrigin') || '*';
      function safePostToParent(msg) {
        try {
          parent.postMessage(msg, parentOrigin === '*' ? '*' : parentOrigin);
        } catch (e) {}
      }
      window.__runnerPostToParent = safePostToParent;
      window.addEventListener('message', function (ev) {
        if (parentOrigin !== '*' && ev.origin !== parentOrigin) return;
        const d = ev && ev.data;
        if (!d) return;
        if (d.type === 'parent-ping') {
          safePostToParent({ type: 'runner-pong', id: d.id, ts: Date.now() });
          return;
        }
        if (d.type === 'cheerpj-key-command') {
          window.__runnerLastKeyMessage = d;
        }
      });
      setInterval(function () {
        safePostToParent({ type: 'runner-heartbeat', ts: Date.now() });
      }, 1000);
      safePostToParent({ type: 'runner-script-loaded', ts: Date.now(), href: location.href });
    })();

    function relay(level, args) {
      try {
        const msg = args.map(a => typeof a === 'object' ? (a && (a.stack || JSON.stringify(a))) : String(a)).join(' ');
        const line = '[' + level + '] ' + msg;
        fetch('/api/browser-log', { method:'POST', headers:{'Content-Type':'text/plain'}, body: line }).catch(()=>{});
      } catch (e) {}
    }
    const _log = console.log, _warn = console.warn, _err = console.error;
    console.log = (...a) => { _log(...a); relay('LOG', a); };
    console.warn = (...a) => { _warn(...a); relay('WARN', a); };
    console.error = (...a) => { _err(...a); relay('ERR', a); };
    window.onerror = (m,u,l,c,e) => relay('FATAL', [m, u, l + ':' + c, e && e.stack || '']);
    window.onunhandledrejection = e => relay('PROMISE', [e.reason && (e.reason.stack || e.reason) || e]);

    function Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication(lib, app) {
      window.__freej2meApp = app;
      console.log('nativeSetApplication ready');
    }

    (function(){
      const keyState = new Map();
      const pendingKeys = [];
      let keyPumpBusy = false;
      function dispatchSynthetic(d) {
        const type = d.isDown ? 'keydown' : 'keyup';
        const key = d.key || '';
        const code = d.code || '';
        const keyCode = Number(d.keyCode || 0);
        const evt = new KeyboardEvent(type, { key, code, bubbles:true, cancelable:true, composed:true });
        [['keyCode', keyCode], ['which', keyCode], ['charCode', 0]].forEach(([k,v]) => { try { Object.defineProperty(evt, k, { get: () => v }); } catch(e) {} });
        const container = document.getElementById('contenedor-juego');
        [container, document.activeElement, document, window].forEach(t => { try { if (t && t.dispatchEvent) t.dispatchEvent(evt); } catch(e) {} });
      }
      async function flushPendingKeys() {
        if (keyPumpBusy) return;
        if (!window.__freej2meApp || typeof window.__freej2meApp.virtualKeyFromJS !== 'function') return;
        keyPumpBusy = true;
        try {
          while (pendingKeys.length) {
            const d = pendingKeys.shift();
            if (!d) continue;
            const code = Number(d.midpCode || 0);
            if (!code) continue;
            const prev = keyState.get(code) === true;
            if (prev === !!d.isDown) continue;
            try {
              await window.__freej2meApp.virtualKeyFromJS(code, !!d.isDown);
              keyState.set(code, !!d.isDown);
            } catch (e) {
              pendingKeys.unshift(d);
              break;
            }
          }
        } finally {
          keyPumpBusy = false;
        }
      }
      window.__runnerConsumeKeyMessage = function(d) {
        if (!d || d.type !== 'cheerpj-key-command') return;
        pendingKeys.push(d);
        dispatchSynthetic(d);
        flushPendingKeys();
      };
      setInterval(function(){
        const d = window.__runnerLastKeyMessage;
        if (d) {
          window.__runnerLastKeyMessage = null;
          window.__runnerConsumeKeyMessage(d);
        }
        flushPendingKeys();
      }, 16);
      window.addEventListener('blur', () => { keyState.clear(); pendingKeys.length = 0; }, true);
      document.addEventListener('visibilitychange', () => { if (document.hidden) { keyState.clear(); pendingKeys.length = 0; } }, true);
    })();
  </script>
  <script src="./cheerpj/4.3/loader.js"></script>
</head>
<body>
  <div id="contenedor-juego" tabindex="0"></div>
  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const w = parseInt(params.get('width') || '240', 10);
      const h = parseInt(params.get('height') || '320', 10);
      const file = params.get('file') || '';
      const appJarUrl = params.get('jarUrl') || ('/emu/jar/' + encodeURIComponent(token) + '.jar');
      console.log('BOOT', { token, w, h, file, appJarUrl, href: location.href });

      const container = document.getElementById('contenedor-juego');
      container.style.width = w + 'px';
      container.style.height = h + 'px';

      window.__runnerPostToParent && window.__runnerPostToParent({ type: 'runner-cheerpj-init-start', ts: Date.now() });

      console.log('cheerpjInit start');
      await cheerpjInit({
        natives: { Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication },
        clipboardMode: 'system',
        javaProperties: [
          'java.awt.headless=false'
        ]
      });
      console.log('cheerpjInit done');

      window.__runnerPostToParent && window.__runnerPostToParent({ type: 'runner-cheerpj-init-done', ts: Date.now() });

      cheerpjCreateDisplay(w, h, container);
      console.log('cheerpjCreateDisplay done');

      try {
        await cheerpjRunMain(
          'org.recompile.freej2me.FreeJ2ME',
          '/app/web5/app/freej2me.jar:/app/web5/app/freej2me-sdl.jar',
          appJarUrl,
          String(w),
          String(h),
          '1'
        );
        console.log('cheerpjRunMain exited cleanly');
      } catch (err) {
        console.error('cheerpjRunMain failed', err);
      }
    })();
  </script>
</body>
</html>
