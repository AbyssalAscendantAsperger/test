<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>J2ME-For-Web Runtime</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }
        #screen-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #display {
            background-color: #000;
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
        }
        #display:focus {
            outline: none;
        }
        #loading {
            color: #00d4ff;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="screen-area">
        <div id="loading">Loading VM...</div>
        <canvas id="display" tabindex="0" style="display:none;"></canvas>
    </div>
    <script>
        // Check if canvas gets initialized
        const checkCanvasInterval = setInterval(() => {
            const canvas = document.getElementById('display');
            if (canvas && canvas.width > 0 && canvas.height > 0) {
                canvas.style.display = 'block';
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
                clearInterval(checkCanvasInterval);
            }
        }, 100);
    </script>
    <script src="tests/browser/run-bundle.js"></script>
</body>
</html>
