<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <title>J2ME CheerpJ Mode 5 v9</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; user-select: none; -webkit-user-select: none; }
        #contenedor-juego { position: relative; overflow: hidden; image-rendering: pixelated; outline: none; }
    </style>
    <script>
        function relayLog(level, args) {
          try {
            const msg = args.map(a => (typeof a === 'object' ? (a.stack || JSON.stringify(a)) : String(a))).join(' ');
            fetch('/api/browser-log', { method: 'POST', body: '[V9-' + level + '] ' + msg, headers: { 'Content-Type': 'text/plain' } }).catch(()=>{});
          } catch(e){}
        }
        const oLog = console.log; console.log = function(...a) { oLog.apply(console, a); relayLog('INFO', a); };
        const oErr = console.error; console.error = function(...a) { oErr.apply(console, a); relayLog('ERROR', a); };
        const oWarn = console.warn; console.warn = function(...a) { oWarn.apply(console, a); relayLog('WARN', a); };
        window.onerror = function(m, u, l, c, e) { relayLog('FATAL', [m, 'at', l + ':' + c, e ? e.stack : '']); };
        window.onunhandledrejection = function(e) { relayLog('UNHANDLED', [e.reason ? (e.reason.stack || e.reason) : e]); };
        async function Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication(lib, app) {
          window.__freej2meApp = app;
          console.log('[Mode5-KeyBridge] Java FreeJ2ME app instance exposed to JS. Direct virtual input enabled.');
          return new Promise(function(){ });
        }
    </script>
    <script>
        // Bridge phím ảo từ launcher Node/public/index.html vào AWT/CheerpJ.
        // Parent gửi {type:'cheerpj-key-command', key, code, keyCode, isDown, midpCode}.
        // Tại đây ta tái phát KeyboardEvent synthetic vào container/canvas/window để
        // CheerpJ chuyển thành java.awt.event.KeyEvent cho core FreeJ2ME.
        window.addEventListener('message', function(ev) {
          const d = ev && ev.data;
          if (!d || d.type !== 'cheerpj-key-command') return;
          try {
            const type = d.isDown ? 'keydown' : 'keyup';
            const key = d.key || '';
            const code = d.code || '';
            const keyCode = Number(d.keyCode || 0);
            const charCode = (type === 'keypress' && key && key.length === 1) ? key.charCodeAt(0) : 0;
            if (window.__freej2meApp && typeof window.__freej2meApp.virtualKeyFromJS === 'function') {
              try {
                const r = window.__freej2meApp.virtualKeyFromJS(Number(d.midpCode || 0), !!d.isDown);
                if (r && typeof r.catch === 'function') r.catch(function(e){ console.warn('[Mode5-KeyBridge] direct Java virtualKeyFromJS rejected', e); });
              } catch(e) { console.warn('[Mode5-KeyBridge] direct Java virtualKeyFromJS failed', e); }
            } else {
              console.warn('[Mode5-KeyBridge] Java app instance not ready; falling back to synthetic KeyboardEvent');
            }
            const evtInit = { key, code, bubbles: true, cancelable: true, composed: true };
            const evt = new KeyboardEvent(type, evtInit);
            [['keyCode', keyCode], ['which', keyCode], ['charCode', charCode]].forEach(function(pair) {
              try { Object.defineProperty(evt, pair[0], { get: function(){ return pair[1]; } }); } catch(e) {}
            });
            const container = document.getElementById('contenedor-juego');
            const canvas = container && (container.querySelector('canvas') || container.querySelector('[tabindex]'));
            try { if (container) container.focus(); } catch(e) {}
            [canvas, container, document.activeElement, document, window].forEach(function(t) {
              try { if (t && t.dispatchEvent) t.dispatchEvent(evt); } catch(e) {}
            });
            if (d.isDown && key && key.length === 1) {
              const kp = new KeyboardEvent('keypress', evtInit);
              [['keyCode', keyCode], ['which', keyCode], ['charCode', key.charCodeAt(0)]].forEach(function(pair) {
                try { Object.defineProperty(kp, pair[0], { get: function(){ return pair[1]; } }); } catch(e) {}
              });
              [canvas, container, document.activeElement, document, window].forEach(function(t) {
                try { if (t && t.dispatchEvent) t.dispatchEvent(kp); } catch(e) {}
              });
            }
            console.log('[Mode5-KeyBridge] ' + type + ' key=' + key + ' code=' + code + ' keyCode=' + keyCode + ' midp=' + d.midpCode);
          } catch(e) { console.warn('[Mode5-KeyBridge] failed', e); }
        }, false);
    </script>
    <script src="./cheerpj/4.3/loader.js"></script>
</head>
<body>
    <div id="contenedor-juego" tabindex="0"></div>
    <script>
        (async function () {
            console.log('🌐 Booting CheerpJ Mode 5 (V9 Definitive)...');
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const w = parseInt(params.get('width') || '240', 10);
            const h = parseInt(params.get('height') || '320', 10);
            const displayH = h;

            const container = document.getElementById("contenedor-juego");
            container.style.width = w + 'px';
            container.style.height = displayH + 'px';

            console.log('⏳ Initializing CheerpJ VM...');
            await cheerpjInit({ natives: { Java_org_recompile_freej2me_FreeJ2ME_nativeSetApplication } });
            console.log('✅ CheerpJ VM initialized.');

            cheerpjCreateDisplay(w, displayH, container);
            try { container.focus(); } catch(e) {}
            console.log('🖥️ Display canvas attached.');

            const appJarUrl = "/app/emu/jar/" + encodeURIComponent(token) + ".jar";
            console.log('🎯 ROM argument:', appJarUrl);

            console.log('🚀 Executing FreeJ2ME Main Class with args:', appJarUrl, String(w), String(h), '1');
            try {
              await cheerpjRunMain(
                  "org.recompile.freej2me.FreeJ2ME",
                  "/app/web5/app/freej2me.jar:/app/web5/app/freej2me-sdl.jar",
                  appJarUrl,
                  String(w),
                  String(h),
                  "1"
              );
              console.log('✨ cheerpjRunMain exited cleanly.');
            } catch (err) {
              console.error('❌ Exception in cheerpjRunMain:', err);
            }
        })();
    </script>
</body>
</html>
