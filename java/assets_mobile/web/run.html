<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>freej2me-web</title>
</head>
<style>
    html, body {
        height: 100%;
    }
    body {
        margin: 0;
        padding: 0;
        font-family: sans;
    }
    #screen-area {
        background-color: #eee;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #display {
        background-color: white;
        zoom: 1;
        image-rendering: pixelated; /* affects zoom */
    }
    #display:focus {
        outline: none;
    }
    #loading {
        font-size: 2em;
    }

    #input-debug {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 99999;
        background: rgba(0,0,0,0.78);
        color: #7CFF7C;
        font: 12px/1.35 monospace;
        padding: 8px 10px;
        border-radius: 8px;
        max-width: min(92vw, 520px);
        white-space: pre-wrap;
        display: none;
        pointer-events: none;
    }
    .show-input-debug #input-debug {
        display: block;
    }

    .keypad-part {
        background-color: #222; /* Dark background for keypad areas */
        padding: 8px;
        display: flex; /* Use flex to center the grid */
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent; /* Disable tap highlight on mobile */
    }

    .key-grid {
        display: grid;
        gap: 6px; /* Space between keys */
        width: 100%;
        height: 100%;
    }

    /* Grid definitions */
    .left-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
    }

    .right-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
    }

    /* Individual Key Styles */
    .key {
        background-color: #3a3a3a; /* Dark key background */
        color: #e0e0e0; /* Light key text */
        border: 1px solid #555;
        border-radius: 5px;
        font-size: 1.5em; /* Larger text */
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column; /* Allow stacking number/letters */
        align-items: center;
        justify-content: center;
        text-align: center;
        user-select: none; /* Prevent text selection on click/drag */
        transition: background-color 0.1s ease, transform 0.05s ease;
        line-height: 1.1;
    }
    .key span { /* Style for secondary text like ABC */
        font-size: 0.4em;
        font-weight: normal;
        margin-top: 2px;
        color: #aaa;
    }

    .key.active {
        background-color: #6a6a6a;
        transform: scale(0.95); /* Slight shrink effect on press */
    }

    .arrow-key {
        font-size: 2em; /* Make arrows bigger */
    }

    .ok-key {
        font-size: 1.3em;
    }

    /* Styles for specifically smaller keys */
    .small-key {
        /* Instead of scaling the whole button, we control its size within the grid cell */
        width: 70%;
        height: 70%;
        font-size: 0.9em;
        align-self: end;   /* Center vertically in grid cell */
        /* Ensure padding/border don't make it too big */
        padding: 2px;
        line-height: 1;
    }

    .small-key-left {
        justify-self: left;
    }

    .small-key-right {
        justify-self: right;
    }


    #left-keys,
    #right-keys {
        display: none;
        position: absolute;
        bottom: 0;
    }

    #left-keys {
        left: 0;
    }

    #right-keys {
        right: 0;
    }

    #screen-area {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    body.kbd-portrait #left-keys,
    body.kbd-portrait #right-keys,
    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        display: flex;
    }

    .no-embedded-keypad body.kbd-portrait #left-keys,
    .no-embedded-keypad body.kbd-portrait #right-keys,
    .no-embedded-keypad body.kbd-landscape #left-keys,
    .no-embedded-keypad body.kbd-landscape #right-keys {
        display: none !important;
    }

    .no-embedded-keypad body.kbd-portrait #screen-area,
    .no-embedded-keypad body.kbd-landscape #screen-area {
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
    }

    body.kbd-portrait #left-keys,
    body.kbd-portrait #right-keys {
        width: 50%;
        height: 220px;
    }

    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        width: 220px;
        height: 100%;
    }

    /* max height in landscape mode */
    body.kbd-landscape #left-keys .key-grid,
    body.kbd-landscape #right-keys .key-grid {
        max-height: 400px;
    }

    body.kbd-portrait #screen-area {
        bottom: 220px;
    }

    body.kbd-landscape #screen-area {
        left: 220px;
        right: 220px;
    }

</style>
<body>
    <div id="input-debug"></div>
    <div id="screen-area">
        <canvas tabindex="0" id="display" style="display: none;"></canvas>
        <div id="loading">Loading...</div>
    </div>
    <div id="left-keys" class="keypad-part">
        <div class="key-grid left-grid">
            <button data-key="Digit1" class="key">1</button>
            <button data-key="Digit2" class="key">2 <span>ABC</span></button>
            <button data-key="Digit3" class="key">3 <span>DEF</span></button>
            <button data-key="Digit4" class="key">4 <span>GHI</span></button>
            <button data-key="Digit5" class="key">5 <span>JKL</span></button>
            <button data-key="Digit6" class="key">6 <span>MNO</span></button>
            <button data-key="Digit7" class="key">7 <span>PQRS</span></button>
            <button data-key="Digit8" class="key">8 <span>TUV</span></button>
            <button data-key="Digit9" class="key">9 <span>WXYZ</span></button>
            <button data-key="NumpadAsterisk" class="key">*</button>
            <button data-key="Digit0" class="key">0 <span>+</span></button>
            <button data-key="NumpadDivide" class="key">#</button>
        </div>
    </div>
    <div id="right-keys" class="keypad-part">
         <div class="key-grid right-grid">
            <button data-key="F1" class="key">L</button>
            <button data-key="ArrowUp" class="key arrow-key" aria-label="Up">↑</button>
            <button data-key="F2" class="key">R</button>
            <button data-key="ArrowLeft" class="key arrow-key" aria-label="Left">←</button>
            <button data-key="Enter" class="key ok-key">OK</button>
            <button data-key="ArrowRight" class="key arrow-key" aria-label="Right">→</button>
            <button data-key="Escape" class="key small-key small-key-left">Esc</button>
            <button data-key="ArrowDown" class="key arrow-key" aria-label="Down">↓</button>
            <button data-key="Maximize" class="key small-key small-key-right" aria-label="Maximize">⛶</button>
        </div>
    </div>
    <script>
      (function(){
        const sp = new URLSearchParams(location.search);
        if (sp.get('nokeypad') === '1') {
          document.documentElement.classList.add('no-embedded-keypad');
        }
      })();
    </script>
    <script>
      (function(){
        const sp = new URLSearchParams(location.search);
        const debugEnabled = sp.get('debugkeys') === '1';
        if (debugEnabled) document.documentElement.classList.add('show-input-debug');

        function formatEvt(e, phase) {
          return [
            '[' + phase + '] ' + e.type,
            'key=' + JSON.stringify(e.key),
            'code=' + JSON.stringify(e.code),
            'keyCode=' + e.keyCode,
            'which=' + e.which,
            'charCode=' + e.charCode
          ].join(' | ');
        }

        function setupDebug(){
          if (!debugEnabled) return;
          const box = document.getElementById('input-debug');
          if (!box) return;
          const lines = [];
          const push = (msg) => {
            lines.unshift(msg);
            while (lines.length > 10) lines.pop();
            box.textContent = lines.join('\n');
          };

          const handler = (phase) => (e) => push(formatEvt(e, phase));
          window.addEventListener('keydown', handler('window'), true);
          window.addEventListener('keypress', handler('window'), true);
          window.addEventListener('keyup', handler('window'), true);
          document.addEventListener('keydown', handler('document'), true);
          document.addEventListener('keypress', handler('document'), true);
          document.addEventListener('keyup', handler('document'), true);

          const waitDisplay = setInterval(() => {
            const display = document.getElementById('display');
            if (!display) return;
            clearInterval(waitDisplay);
            display.addEventListener('keydown', handler('display'), true);
            display.addEventListener('keypress', handler('display'), true);
            display.addEventListener('keyup', handler('display'), true);
            push('debugkeys=1 active');
          }, 250);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', setupDebug, { once: true });
        } else {
          setupDebug();
        }
      })();
    </script>
    <script src="https://cjrtnc.leaningtech.com/20260317_2978/loader.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
